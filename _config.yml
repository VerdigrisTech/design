title: "Verdigris Design System"
description: "Canonical design tokens, guidelines, and visual rules for all Verdigris surfaces"
url: "https://design.verdigris.co"

# No theme -- using custom _layouts/default.html
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude build artifacts and dev files from the Jekyll site.
# build/print/ ships publicly (reference print stylesheet for whitepaper covers);
# build/dist/ and build/*.ts are generated outputs and dev tooling.
exclude:
  - build/dist/
  - build/config.ts
  - build/validate.ts
  - build/validate-rules.ts
  - build/lint-external.ts
  - node_modules/
  - package.json
  - package-lock.json
  - tsconfig.json
  - Gemfile
  - Gemfile.lock
  - "*.ts"
  - "*.js"
  - docs/brand-alignment-analysis.md
  - docs/figma-sync.md
  - categories/_guide-template.md
  - examples/_template.md
  - evolution.html
  - tests/
  - playwright.config.ts
  - playwright-report/
  - test-results/
  - vendor/

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "foundations"
    values:
      layout: "default"
      section: "foundations"
  - scope:
      path: "categories"
    values:
      layout: "default"
      section: "categories"
  - scope:
      path: "examples"
    values:
      layout: "default"
      section: "examples"
  - scope:
      path: "docs"
    values:
      layout: "default"
      section: "docs"
