# Visual Design Rules
# Machine-enforceable rules for evaluator pipelines.
# Consumed by www evaluator via @verdigristech/design-tokens/rules/visual-rules.yml
#
# Version: 2.2.0
# Last updated: 2026-04-13
#
# Schema: visual-rules/2.1.0
# Every enforceable rule entry MUST have:
#   id:          unique dot-path identifier (e.g., color.contrast.normal-text)
#   severity:    "error" | "warning"
#   type:        "value" | "pattern" | "constraint" | "reference"
#   description: human-readable explanation
#   test:        machine-testable field -- one of:
#     regex:     regex pattern to match/flag in source
#     min/max:   numeric bounds
#     value:     exact required value
#     values:    set of allowed values
#     llm_eval:  LLM-based evaluation -- two formats:
#       (string)  simple yes/no prompt, e.g. "Does this page have...? Answer YES/NO"
#       (object)  structured evaluation with:
#         prompt:       evaluation instruction for the LLM
#         rubric:       array of { criterion, score, fail_threshold }
#         aggregation:  pass/fail logic across rubric criteria
#       Convention: YES = violation found (rule FAILS). NO = condition met (rule PASSES).
#     input_scope: (optional, peer of llm_eval inside test block) array of context labels
#                  for multi-page evaluation. Tells the evaluator what pages to provide.
#                  e.g. ["all_pages_with_turn_moments"] or ["upstream_page", "current_page"]

# =============================================================================
# COLOR
# =============================================================================
color:
  # ---------------------------------------------------------------------------
  # Brand teal
  # ---------------------------------------------------------------------------
  brand_teal:
    id: "color.brand-teal"
    type: "reference"
    oklch: "oklch(0.75 0.1286 191.57)"
    hex: "#0fc8c3"
    hsl: "hsl(178, 86%, 42%)"
    usage: "Decorative brand color -- backgrounds, illustrations, data viz"
    never_as_text_on_white: true   # Fails WCAG AA (contrast ~2.9:1 on white)
    ok_on_dark_backgrounds: true   # Passes AA on neutral.950 and darker
    min_background_lightness: 0.35 # OKLch L* of background must be <= this for teal text
    rules:
      - id: "color.brand-teal.no-text-on-white"
        description: "Brand teal fails WCAG AA (~2.9:1) as text on white backgrounds"
        severity: "error"
        type: "constraint"
        test:
          max: 0.35              # OKLch L* of background for teal text
      - id: "color.brand-teal.decorative-only-light"
        description: "Brand teal on light backgrounds is decorative only -- not for text"
        severity: "error"
        type: "constraint"
        test:
          regex: "color:\\s*oklch\\(0\\.75\\s+0\\.1286|color:\\s*#0fc8c3|color:\\s*var\\(--brand-verdigris\\)"

  # ---------------------------------------------------------------------------
  # Brand gradient stops (for reference -- enforce order only)
  # ---------------------------------------------------------------------------
  brand_gradient:
    id: "color.brand-gradient"
    type: "reference"
    description: "Teal -> Purple -> Red -> Yellow -> Teal loop. 16 stops."
    start: "oklch(0.75 0.1286 191.57)"   # brand.verdigris
    end: "oklch(0.87 0.1786 92.23)"       # brand.cyber-yellow
    enforce_order: true  # Gradient stops must follow hue rotation

  # ---------------------------------------------------------------------------
  # WCAG contrast requirements per context
  # ---------------------------------------------------------------------------
  contrast:
    normal_text:
      id: "color.contrast.normal-text"
      severity: "error"
      type: "constraint"
      min_ratio: 4.5
      description: "WCAG AA for text < 18px bold or < 24px regular"
      test:
        min: 4.5
    large_text:
      id: "color.contrast.large-text"
      severity: "error"
      type: "constraint"
      min_ratio: 3.0
      description: "WCAG AA for text >= 18px bold or >= 24px regular"
      test:
        min: 3.0
    ui_components:
      id: "color.contrast.ui-components"
      severity: "error"
      type: "constraint"
      min_ratio: 3.0
      description: "WCAG AA for interactive UI components and graphical objects"
      test:
        min: 3.0
    decorative:
      id: "color.contrast.decorative"
      type: "reference"
      min_ratio: 0
      description: "No contrast requirement for purely decorative elements"
    enhanced_normal_text:
      id: "color.contrast.enhanced"
      severity: "warning"
      type: "constraint"
      min_ratio: 7.0
      description: "WCAG AAA for normal text (aspirational, not blocking)"
      test:
        min: 7.0

  # ---------------------------------------------------------------------------
  # Dark mode requirements
  # ---------------------------------------------------------------------------
  dark_mode:
    id: "color.dark-mode"
    type: "value"
    background:
      value: "oklch(0.141 0.005 285.823)"   # neutral.950
      description: "Near-black, NOT pure black. Pure black (#000) is banned."
      never_pure_black: true
    card_background:
      value: "oklch(0.21 0.006 285.885)"     # neutral.900
    border:
      description: "Semi-transparent borders in dark mode for layering"
      pattern: "border-color:\\s*oklch\\([^)]+\\s*/\\s*[\\d.]+\\)"
      recommended_opacity_range: [0.1, 0.3]
    text_foreground:
      value: "oklch(0.985 0 0)"              # neutral.50
    muted_foreground:
      value: "oklch(0.552 0.016 285.938)"    # neutral.500

  # ---------------------------------------------------------------------------
  # Banned colors -- flag if found in source
  # ---------------------------------------------------------------------------
  banned_colors:
    id: "color.banned"
    type: "pattern"
    severity: "error"
    description: "Flag banned color literals in source -- use design tokens instead"
    items:
      - value: "#ff0000"
        reason: "Pure red -- use status.destructive-light or destructive-dark"
      - value: "#00ff00"
        reason: "Pure green -- off-brand"
      - value: "#0000ff"
        reason: "Pure blue -- off-brand"
      - value: "#000000"
        reason: "Pure black -- use neutral.950 oklch(0.141 0.005 285.823)"
        context: "background"  # Only banned as background; OK in SVG strokes
      - value: "#ffffff"
        reason: "Prefer neutral.50 for foreground in dark mode"
        context: "dark_mode_text"
        severity: "warning"
      - value: "rgb(0, 0, 255)"
        reason: "Pure blue -- off-brand"
      - value: "rgb(255, 0, 0)"
        reason: "Pure red -- use status tokens"
      - value: "rgb(0, 255, 0)"
        reason: "Pure green -- off-brand"
      - value: "#ff00ff"
        reason: "Magenta -- off-brand"
      - value: "#800080"
        reason: "Generic purple -- use brand.midnight-purple"
      - value: "#ffa500"
        reason: "Generic orange -- off-brand"
      - value: "#008000"
        reason: "Generic green -- off-brand"

  # ---------------------------------------------------------------------------
  # Neutral palette (for rule cross-referencing)
  # ---------------------------------------------------------------------------
  neutrals:
    id: "color.neutrals"
    type: "reference"
    description: "Neutral palette for rule cross-referencing"
    white: "oklch(1 0 0)"
    "50": "oklch(0.985 0 0)"
    "100": "oklch(0.967 0.001 286.375)"
    "200": "oklch(0.92 0.004 286.32)"
    "400": "oklch(0.705 0.015 286.067)"
    "500": "oklch(0.552 0.016 285.938)"
    "800": "oklch(0.274 0.006 286.033)"
    "900": "oklch(0.21 0.006 285.885)"
    "950": "oklch(0.141 0.005 285.823)"
    black: "oklch(0 0 0)"

  # ---------------------------------------------------------------------------
  # Status colors
  # ---------------------------------------------------------------------------
  status:
    id: "color.status"
    type: "reference"
    description: "Status color values for rule cross-referencing"
    destructive_light: "oklch(0.577 0.245 27.325)"
    destructive_dark: "oklch(0.704 0.191 22.216)"

  # ---------------------------------------------------------------------------
  # Palette semantic roles -- machine-consumable color usage guidance
  # Maps palette regions to content categories for AI agents and evaluators.
  # The design system defines what colors MEAN, not just what they ARE.
  # ---------------------------------------------------------------------------
  palette_semantics:
    id: "color.palette-semantics"
    type: "reference"
    description: "Maps brand palette regions to content categories and usage contexts. AI agents and evaluators use this to select contextually appropriate colors for page sections, accents, and data visualization."

    # --- Palette regions (anchor + steps) mapped to content meaning ---
    regions:
      trust:
        id: "color.palette-semantics.trust"
        type: "reference"
        description: "Technical authority, reliability, core brand identity. The primary Verdigris register."
        tokens: ["color.brand.verdigris", "color.brand.mix-step-1", "color.brand.mix-step-2"]
        hue_range: "191°–240°"
        lightness_range: "0.52–0.75"
        content_categories:
          - "technology and platform capabilities"
          - "data quality and validation"
          - "primary brand expression"
          - "charts and data visualization (primary series)"
        usage:
          section_accent: "Background tints, icon backgrounds, decorative borders"
          text: "Only on dark backgrounds (brand teal fails WCAG on white)"
          dark_mode_tint: "oklch(0.75 0.1286 191.57 / 15%) over neutral.950"

      depth:
        id: "color.palette-semantics.depth"
        type: "reference"
        description: "Intelligence, sophistication, premium. The deep end of the palette -- works exceptionally in dark mode."
        tokens: ["color.brand.mix-step-3", "color.brand.midnight-purple"]
        hue_range: "265°–289°"
        lightness_range: "0.29–0.41"
        content_categories:
          - "AI and intelligence features"
          - "premium or enterprise sections"
          - "dark hero backgrounds and overlays"
          - "footer and deep navigation"
        usage:
          section_accent: "Dark section backgrounds, hero overlays, gradient endpoints"
          text: "NOT as text -- too dark (L=0.29-0.41), invisible on dark backgrounds"
          dark_mode_tint: "oklch(0.29 0.1506 289.33 / 18%) over neutral.950 -- use 18%+ for perceptibility"
        constraints:
          min_tint_opacity: 0.15
          reason: "Below 15% opacity, midnight-purple (chroma 0.15) is indistinguishable from neutral gray"

      energy:
        id: "color.palette-semantics.energy"
        type: "reference"
        description: "Urgency, detection, alerting. The vibrant middle of the palette with high chroma."
        tokens: ["color.brand.midnight-purple-step-1", "color.brand.midnight-purple-step-2", "color.brand.midnight-purple-step-3"]
        hue_range: "313°–0°"
        lightness_range: "0.39–0.60"
        content_categories:
          - "fault detection and alerting"
          - "real-time monitoring"
          - "anomaly and signal indicators"
          - "active states and attention-drawing UI"
        usage:
          section_accent: "Accent borders, icon tints, alert section backgrounds"
          text: "mp-step-2 (L=0.50) and mp-step-3 (L=0.60) work as text on both light and dark backgrounds"
          dark_mode_tint: "oklch(0.495 0.1708 336.72 / 12%) over neutral.950"

      warmth:
        id: "color.palette-semantics.warmth"
        type: "reference"
        description: "Human connection, action, engagement. Warm tones that invite interaction."
        tokens: ["color.brand.pastel-red", "color.brand.pastel-red-step-1"]
        hue_range: "24°–41°"
        lightness_range: "0.70–0.74"
        content_categories:
          - "contact and conversation"
          - "CTA hover shifts"
          - "team and people sections"
          - "customer stories and testimonials"
        usage:
          section_accent: "CTA accent color, hover state shifts, warm section tints"
          text: "Pastel red (L=0.70) works as text on dark backgrounds only"
          dark_mode_tint: "oklch(0.7 0.1909 24.11 / 10%) over neutral.950"

      results:
        id: "color.palette-semantics.results"
        type: "reference"
        description: "Optimism, value, proof. Warm-bright tones for metrics and outcomes."
        tokens: ["color.brand.pastel-red-step-2", "color.brand.pastel-red-step-3", "color.brand.cyber-yellow"]
        hue_range: "58°–92°"
        lightness_range: "0.79–0.87"
        content_categories:
          - "metrics, stats, and proof points"
          - "financial outcomes and ROI"
          - "stranded capacity recovery"
          - "positive performance indicators"
        usage:
          section_accent: "Metric highlights, stat number accents, subtle warm backgrounds"
          text: "HIGH CONTRAST RISK -- these are very light (L=0.79-0.87). Only use on dark backgrounds."
          dark_mode_tint: "oklch(0.87 0.1786 92.23 / 8%) over neutral.950 -- visible due to high lightness"

      growth:
        id: "color.palette-semantics.growth"
        type: "reference"
        description: "Sustainability, recovery, completion. Green-teal tones closing the loop back to brand."
        tokens: ["color.brand.cyber-yellow-step-1", "color.brand.cyber-yellow-step-2", "color.brand.cyber-yellow-step-3"]
        hue_range: "113°–164°"
        lightness_range: "0.75–0.81"
        content_categories:
          - "M&V (measurement and verification) results"
          - "capacity recovery outcomes"
          - "sustainability and environmental impact"
          - "completion and success states"
        usage:
          section_accent: "Background tints for outcome/success sections"
          text: "Light (L=0.75-0.81) -- dark backgrounds only"
          dark_mode_tint: "oklch(0.7698 0.1588 137.1 / 10%) over neutral.950"

      neutral:
        id: "color.palette-semantics.neutral"
        type: "reference"
        description: "Breathing room, readability, structural clarity. Use between colored sections to prevent chromatic fatigue."
        tokens: ["color.neutral.50", "color.neutral.100", "color.neutral.200", "color.neutral.800", "color.neutral.900", "color.neutral.950"]
        content_categories:
          - "body text and long-form content"
          - "structural sections (purpose-built, deploy at scale)"
          - "breathing room between colored sections"
          - "form and input backgrounds"
        usage:
          section_accent: "Default section backgrounds -- white/neutral.100 (light), neutral.950/900 (dark)"
          text: "Primary text color in both modes"

    # --- Taste boundaries (upper AND lower) ---
    #
    # Brand pillars: Precise, Masterful, Refined, Pioneering.
    # "Credibility through restraint. Sophisticated buyers, not impulse shoppers."
    # "Controlled color palette, no visual clutter." (Masterful)
    # "Subtle use of the brand gradient." (Refined)
    # "Every element earns its place." (Precision)
    #
    # These rules codify restraint. Without ceilings, an AI agent will
    # optimize toward maximum palette coverage -- which reads as a rainbow.
    # Color is earned, not assigned by lookup table.
    #
    taste_boundaries:
      teal_dominance:
        id: "color.palette-semantics.teal-dominance"
        severity: "error"
        type: "constraint"
        description: "Teal (trust region) + neutrals must comprise at least 70% of any surface's color expression. The brand IS teal -- other palette regions are rare accents, not co-primaries. 'Controlled color palette, no visual clutter.' (Masterful pillar)"
        test:
          min: 0.7
        measurement_heuristic: "Count colored elements on the page (buttons, borders, badges, gradient stops, icons with non-neutral fill). No more than 3 of every 10 colored elements should use non-teal accents. Neutral elements (text, backgrounds, borders using gray/white/black) are excluded from the count."
      max_regions_per_surface:
        id: "color.palette-semantics.max-regions"
        severity: "error"
        type: "constraint"
        description: "Maximum non-neutral palette regions per surface. 'Subtle use of the brand gradient.' (Refined pillar) -- every accent must earn its place."
        test:
          max: 2
          note: "Default max is 2 (web_page). Specific surface limits: landing_page=1, ad_banner=1, email=1, data_visualization=6. Count distinct non-neutral palette regions used."
        web_page: 2           # Homepage/landing: trust + 1 accent (2 accents for long pages with 10+ sections, requires justification)
        landing_page: 1       # Focused landing pages: trust only (+ neutrals)
        ad_banner: 1          # Ads: brand teal only (+ neutrals)
        email: 1              # Emails: trust only (+ neutrals)
        white_paper: 2        # Documents: trust + 1 accent for data sections
        physical_goods: 1     # Hardware/packaging: brand teal only
        data_visualization: 6 # Charts: full palette allowed (this is what the gradient was designed for)
        slide_deck: 2         # Presentations: trust + 1 accent per slide
      max_colored_sections:
        id: "color.palette-semantics.max-colored-sections"
        severity: "warning"
        type: "constraint"
        description: "On a multi-section page, no more than 30% of sections should have non-neutral palette accents. 'Every element earns its place.' (Precision pillar)"
        test:
          max: 0.3

    # --- Section color rules (evaluator-enforceable) ---
    rules:
      - id: "color.palette-semantics.no-monotone"
        description: "Homepage should use at least 1 palette region beyond teal + neutrals for visual interest (but no more than 2 total non-neutral regions -- see max-regions)"
        severity: "warning"
        type: "constraint"
        test:
          min: 1
          max: 2
      - id: "color.palette-semantics.no-random-color"
        description: "Section accent colors must match the content category -- do not assign palette regions arbitrarily"
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does any non-neutral colored section use a palette region that does not match its content category (as defined in color.palette-semantics.regions)? Answer YES if any accent color is arbitrary or unjustified, NO if every accent matches its section content."
      - id: "color.palette-semantics.adjacent-colored-sections"
        description: "Never place two non-neutral colored sections adjacent to each other. Always separate with a neutral section."
        severity: "error"
        type: "constraint"
        test:
          max: 0
      - id: "color.palette-semantics.dark-tint-opacity"
        description: "Dark mode brand tints must use 15%+ opacity for depth region, 10%+ for others -- below this they are imperceptible"
        severity: "error"
        type: "constraint"
        test:
          min: 0.10
          note: "depth region requires min 0.15; all other regions require min 0.10"
      - id: "color.palette-semantics.tint-contrast"
        description: "Text on brand-tinted dark backgrounds must still pass WCAG AA (4.5:1). Verify contrast after applying tint."
        severity: "error"
        type: "constraint"
        test:
          min: 4.5
      - id: "color.palette-semantics.accent-subtlety"
        description: "Section palette accents should be subtle -- background tints and label colors, NOT full-saturation section backgrounds. The palette region informs a hint, not a paint job."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does any section use a brand color at full saturation as its background rather than as a subtle tint, border, or label? Answer YES if any accent is used at full saturation as a section background, NO if all accents are restrained hints."

  # ---------------------------------------------------------------------------
  # Section flow rules -- lightness rhythm and transition discipline
  #
  # Pages have a lightness direction. Alternating dark/light sections
  # creates a strobe effect. Commit to a direction and vary within it;
  # reserve dark moments for deliberate emphasis.
  # ---------------------------------------------------------------------------
  section_flow:
    id: "color.section-flow"
    type: "reference"
    description: "Rules governing how section background lightness changes as the user scrolls. Prevents dark/light strobing and creates cohesive page rhythm."

    lightness_direction:
      id: "color.section-flow.lightness-direction"
      severity: "error"
      type: "constraint"
      description: "Commit to a lightness direction within content sections. A light-mode page flows through light backgrounds (white ↔ neutral.100 ↔ neutral.50). A dark-mode page flows through dark backgrounds (neutral.950 ↔ neutral.900 ↔ neutral.800). Do not alternate between dark and light sections within the same content flow."
      test:
        llm_eval: "Do the content sections (excluding hero and footer) alternate between dark and light backgrounds rather than committing to a single lightness direction? Answer YES if sections break lightness consistency, NO if they maintain a consistent lightness range throughout."

    tonal_variation:
      id: "color.section-flow.tonal-variation"
      type: "reference"
      description: "Differentiate adjacent neutral sections with subtle tonal shifts, not lightness jumps."
      light_mode:
        backgrounds: ["white", "oklch(0.985 0 0)", "oklch(0.967 0.001 286.375)"]  # white, neutral.50, neutral.100
        description: "Alternate between white and neutral.100 for gentle rhythm. Never jump to neutral.800+ within a light flow."
      dark_mode:
        backgrounds: ["oklch(0.141 0.005 285.823)", "oklch(0.21 0.006 285.885)", "oklch(0.274 0.006 286.033)"]  # neutral.950, neutral.900, neutral.800
        description: "Alternate between neutral.950 and neutral.900 for gentle rhythm. Never jump to white within a dark flow."

    dark_accent_moment:
      id: "color.section-flow.dark-accent-moment"
      severity: "error"
      type: "constraint"
      description: "A light-mode page may include at most ONE dark-background section as a deliberate accent moment (e.g., a hero, a detection callout, or a CTA strip). This is the only justified lightness inversion. More than one dark section in a light page creates strobing."
      test:
        max: 1
      exceptions:
        - "Hero section (always dark) does not count toward the limit -- it precedes the content flow"
        - "Footer (always dark) does not count -- it closes the page"

    hero_transition:
      id: "color.section-flow.hero-transition"
      severity: "warning"
      type: "constraint"
      description: "If the hero is dark and the content flow is light, the transition should happen once at the hero boundary. Do not return to dark until the accent moment (if any)."
      test:
        llm_eval: "After the hero-to-content transition, does the page return to a dark background before the allowed accent moment or footer? Answer YES if there are additional dark sections within the content flow, NO if the dark-to-light transition happens exactly once at the hero boundary."

    rules:
      - id: "color.section-flow.no-strobe"
        description: "Never alternate dark/light/dark/light across consecutive sections. If three adjacent sections have backgrounds with OKLch lightness values that alternate high/low/high or low/high/low, this is a strobe pattern."
        severity: "error"
        type: "pattern"
        test:
          description: "Check that consecutive section backgrounds do not alternate between L>0.8 and L<0.3"
      - id: "color.section-flow.max-lightness-jump"
        description: "Adjacent sections should not have a lightness difference greater than 0.5 OKLch L*, except at the hero boundary and footer boundary. Within the content flow, keep jumps under 0.15 L*."
        severity: "warning"
        type: "constraint"
        test:
          content_flow_max_delta: 0.15
          boundary_exception: ["hero", "footer"]
      - id: "color.section-flow.consistent-text-color"
        description: "Within a content flow, text color should stay consistent. Light flow = dark text throughout. Dark flow = light text throughout. Do not force the reader to re-adapt between sections."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Within the content flow (excluding hero and footer), does the text color change between sections? Answer YES if text color varies across content sections, NO if it stays uniform throughout."


# =============================================================================
# TYPOGRAPHY
# =============================================================================
typography:
  # ---------------------------------------------------------------------------
  # Font stacks -- enforceable via CSS audit
  # ---------------------------------------------------------------------------
  font_stacks:
    id: "typography.font-stacks"
    type: "value"
    severity: "error"
    description: "Required font families -- flag if other fonts appear in source"
    body:
      family: "Inter"
      fallback: "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
      usage: "All body text, UI labels, navigation"
    display:
      family: "Lato"
      fallback: "Lato, ui-sans-serif, system-ui, -apple-system, sans-serif"
      usage: "www headings only; Patina uses Inter for headings"
      scope: "www"
    mono:
      family: "JetBrains Mono"
      fallback: "JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
      usage: "Code blocks, technical values, data labels"

  # ---------------------------------------------------------------------------
  # Heading sizes -- desktop AND mobile breakpoints
  # Source of truth: tokens/typography/scale.json
  # ---------------------------------------------------------------------------
  headings:
    h1:
      desktop:
        size: "4rem"       # 64px
        weight: 700
        line_height: 1.1
        letter_spacing: "-0.02em"
      mobile:
        size: "2.75rem"    # 44px
        weight: 700
        line_height: 1.1
        letter_spacing: "-0.02em"
      breakpoint: "1024px"  # Canonical; www uses 991px (should migrate)
    h2:
      desktop:
        size: "3rem"       # 48px
        weight: 700
        line_height: 1.2
        letter_spacing: "-0.02em"
      mobile:
        size: "2rem"       # 32px
        weight: 700
        line_height: 1.2
        letter_spacing: "-0.02em"
      breakpoint: "1024px"
    h3:
      desktop:
        size: "2rem"       # 32px
        weight: 700
        line_height: 1.3
        letter_spacing: "0"
      mobile:
        size: "1.5rem"     # 24px
        weight: 700
        line_height: 1.3
        letter_spacing: "0"
      breakpoint: "1024px"

  # ---------------------------------------------------------------------------
  # Body sizes
  # ---------------------------------------------------------------------------
  body:
    large:
      size: "1.25rem"      # 20px
      line_height: 1.6
      letter_spacing: "0"
    medium:
      size: "1.125rem"     # 18px
      line_height: 1.6
      letter_spacing: "0"
    regular:
      size: "1rem"         # 16px
      line_height: 1.6
      letter_spacing: "0"
    small:
      size: "0.875rem"     # 14px
      line_height: 1.6
      letter_spacing: "0"

  # ---------------------------------------------------------------------------
  # Font weight constraints per element type
  # ---------------------------------------------------------------------------
  weight_rules:
    - id: "typography.weight.headings"
      severity: "error"
      type: "constraint"
      element: "h1, h2, h3"
      allowed_weights: [700]
      description: "Headings must be bold (700). brand_rules.yml says 600 for H2 -- WRONG, CSS is truth."
      test:
        values: [700]
    - id: "typography.weight.subheadings"
      severity: "error"
      type: "constraint"
      element: "h4, h5, h6"
      allowed_weights: [600, 700]
      description: "Subheadings: semibold or bold"
      test:
        values: [600, 700]
    - id: "typography.weight.body"
      severity: "error"
      type: "constraint"
      element: "body, p, li, td"
      allowed_weights: [400]
      description: "Body text: regular weight only"
      test:
        values: [400]
    - id: "typography.weight.navigation"
      severity: "warning"
      type: "constraint"
      element: "a, nav, label"
      allowed_weights: [400, 500]
      description: "Navigation and labels: regular or medium"
      test:
        values: [400, 500]
    - id: "typography.weight.buttons"
      severity: "error"
      type: "constraint"
      element: "button, .cta"
      allowed_weights: [600]
      description: "Buttons and CTAs: semibold. Exception: .cta-link uses 500 (see components.cta-link)."
      test:
        values: [600]
    - id: "typography.weight.emphasis"
      severity: "warning"
      type: "constraint"
      element: "strong, b"
      allowed_weights: [600, 700]
      description: "Emphasis: semibold or bold"
      test:
        values: [600, 700]

  # ---------------------------------------------------------------------------
  # Line height requirements
  # ---------------------------------------------------------------------------
  line_height_rules:
    - id: "typography.line-height.headings"
      severity: "error"
      type: "constraint"
      context: "headings"
      named_scale: "tight"
      min: 1.1
      max: 1.3
      description: "Headings: tight leading (1.1 for h1, 1.2 for h2, 1.3 for h3)"
      test:
        min: 1.1
        max: 1.3
    - id: "typography.line-height.body"
      severity: "error"
      type: "constraint"
      context: "body"
      named_scale: "relaxed"
      min: 1.6
      max: 1.75
      description: "Base body line-height. Coupling rules on dark/tinted backgrounds may require 1.65-1.75."
      test:
        min: 1.6
        max: 1.75
    - id: "typography.line-height.ui-compact"
      severity: "warning"
      type: "constraint"
      context: "ui_compact"
      min: 1.2
      max: 1.4
      description: "Compact UI elements (badges, pills, table cells)"
      test:
        min: 1.2
        max: 1.4

  # ---------------------------------------------------------------------------
  # Line length rules
  # ---------------------------------------------------------------------------
  line_length:
    body:
      id: "typography.line-length.body"
      type: "constraint"
      severity: "warning"
      description: "Default maximum line length for body text. Tighter values apply on tinted/dark backgrounds and inform/narrate pages."
      test:
        max: "75ch"

  # ---------------------------------------------------------------------------
  # Letter spacing rules
  # ---------------------------------------------------------------------------
  letter_spacing_rules:
    - id: "typography.letter-spacing.large-headings"
      severity: "warning"
      type: "value"
      context: "h1, h2"
      value: "-0.02em"
      description: "Large headings get slight tightening"
      test:
        value: "-0.02em"
    - id: "typography.letter-spacing.small-headings"
      severity: "warning"
      type: "value"
      context: "h3, h4, h5, h6"
      value: "0"
      description: "Smaller headings: no adjustment"
      test:
        value: "0"
    - id: "typography.letter-spacing.body"
      severity: "warning"
      type: "value"
      context: "body"
      value: "0"
      description: "Body text: no adjustment"
      test:
        value: "0"
    - id: "typography.letter-spacing.uppercase"
      severity: "warning"
      type: "value"
      context: "uppercase"
      value: "0.05em"
      description: "Uppercase text (labels, overlines) needs loose tracking"
      test:
        value: "0.05em"


# =============================================================================
# SPACING
# =============================================================================
spacing:
  # ---------------------------------------------------------------------------
  # 4px grid compliance
  # ---------------------------------------------------------------------------
  grid:
    id: "spacing.grid"
    type: "reference"
    description: "All spacing values must be multiples of 4px"
    base_unit: "4px"
    base_rem: "0.25rem"
    allowed_scale:
      - { token: "0", value: "0" }
      - { token: "1", value: "0.25rem" }    #  4px
      - { token: "2", value: "0.5rem" }     #  8px
      - { token: "3", value: "0.75rem" }    # 12px
      - { token: "4", value: "1rem" }       # 16px
      - { token: "5", value: "1.25rem" }    # 20px
      - { token: "6", value: "1.5rem" }     # 24px
      - { token: "8", value: "2rem" }       # 32px
      - { token: "10", value: "2.5rem" }    # 40px
      - { token: "12", value: "3rem" }      # 48px
      - { token: "16", value: "4rem" }      # 64px
      - { token: "20", value: "5rem" }      # 80px
      - { token: "24", value: "6rem" }      # 96px
      - { token: "32", value: "8rem" }      # 128px
    rules:
      - id: "spacing.grid.compliance"
        description: "All spacing values must be multiples of 4px"
        severity: "error"
        type: "constraint"
        exceptions:
          - "1px"       # borders
          - "0.375rem"  # 6px button radius (legacy)
          - "0.625rem"  # 10px canonical radius
          - "9999px"    # pill radius
        test:
          llm_eval: "Are any spacing values (margin, padding, gap, inset, width, height) not a multiple of 4px (excluding the listed exceptions: 1px, 0.375rem, 0.625rem, 9999px)? Answer YES if any non-exception spacing value is not a 4px multiple, NO if all comply."

  # ---------------------------------------------------------------------------
  # Section padding -- desktop and mobile
  # ---------------------------------------------------------------------------
  section_padding:
    standard:
      desktop: "4rem"       # 64px vertical
      mobile: "4rem"        # Same -- standard sections don't shrink
    large:
      desktop: "8rem"       # 128px -- hero/feature sections
      mobile: "5rem"        # 80px
    medium:
      desktop: "5rem"       # 80px -- secondary sections
      mobile: "5rem"

  # ---------------------------------------------------------------------------
  # Page padding (horizontal)
  # ---------------------------------------------------------------------------
  page_padding:
    desktop: "2.5rem"       # 40px
    mobile: "1.5rem"        # 24px
    breakpoint: "1024px"    # Canonical; www uses 991px (should migrate)

  # ---------------------------------------------------------------------------
  # Container
  # ---------------------------------------------------------------------------
  container:
    max_width: "80rem"      # 1280px
    description: "Both www (.container-medium) and Patina use this max-width"

  # ---------------------------------------------------------------------------
  # Responsive hero heights
  # ---------------------------------------------------------------------------
  hero_height:
    base: "60vh"                  # mobile -- conservative to avoid scroll trap
    sm: "70vh"                    # 640px+
    md: "75vh"                    # 768px+
    min: "22rem"                  # floor -- never shorter than 352px regardless of viewport
    preferred_unit: "vh"          # viewport height -- universal support
    note_on_svh: "svh (small viewport height) is preferable to avoid mobile browser chrome overlap, but vh has broader support. Use svh when the project's browser baseline allows it."
    breakpoints:
      sm: "640px"
      md: "768px"
    description: "Hero uses viewport-relative heights so it scales with screen size. 60/70/75vh provides a strong visual impression without trapping the user in a full-viewport scroll barrier. The 22rem floor ensures content visibility in extreme landscape orientations. IMPORTANT: Fixed rem values (22rem, 31rem) must not be used -- they break on non-standard viewports."


# =============================================================================
# MOTION
# =============================================================================
motion:
  # ---------------------------------------------------------------------------
  # Duration tokens
  # ---------------------------------------------------------------------------
  durations:
    fast: "150ms"           # Micro-interactions (hover feedback)
    normal: "200ms"         # Button hover transitions
    moderate: "300ms"       # Card hover, image zoom
    slow: "500ms"           # Hero animations, slide-up
    spin: "800ms"           # Spinner rotation

  # ---------------------------------------------------------------------------
  # Easing tokens
  # ---------------------------------------------------------------------------
  easings:
    default: "ease"         # General-purpose
    out: "ease-out"         # Entrance animations
    linear: "linear"        # Continuous rotation only

  # ---------------------------------------------------------------------------
  # Named animation patterns -- required CSS for each
  # ---------------------------------------------------------------------------
  patterns:
    hover-lift:
      description: "Card/element lifts on hover with shadow"
      duration: "300ms"                             # duration.moderate -- matches hover-states.md
      easing: "ease"
      css: "transition: transform 300ms ease, box-shadow 300ms ease"
      transform: "translateY(-4px)"
      requires_hover_query: true
    hover-scale:
      description: "Container scales up subtly on hover"
      duration: "500ms"                             # duration.slow
      # NOTE: 500ms is at the max-duration ceiling for user-triggered transitions.
      # Use only for secondary/ambient surfaces, not primary interactive elements.
      easing: "ease"
      css: "transition: transform 500ms ease"
      transform: "scale(1.02)"
      requires_hover_query: true
    slide-up:
      description: "Element slides up into view on scroll/mount"
      duration: "500ms"
      easing: "ease-out"
      css: "transition: transform 500ms ease-out, opacity 500ms ease-out"
      transform_from: "translateY(20px)"
      transform_to: "translateY(0)"
      opacity_from: 0
      opacity_to: 1
    image-zoom:
      description: "Image scales slightly on hover"
      duration: "300ms"
      easing: "ease"
      css: "transition: transform 300ms ease"
      transform: "scale(1.05)"
      requires_hover_query: true
    spinner:
      description: "Loading spinner continuous rotation"
      duration: "800ms"
      easing: "linear"
      css: "animation: spin 800ms linear infinite"
      keyframes: "from { transform: rotate(0deg) } to { transform: rotate(360deg) }"
    logo-marquee:
      id: "motion.patterns.logo-marquee"
      severity: "warning"
      type: "pattern"
      description: "CSS keyframe marquee for trust bar logos. Continuous horizontal scroll. Must respect reduced-motion."
      duration: "30s"
      easing: "linear"
      css: "animation: marquee 30s linear infinite"
      keyframes: "from { transform: translateX(0) } to { transform: translateX(-50%) }"
      requires_reduced_motion: true
      requires_duplicate_set: true  # Logo set must be duplicated for seamless loop
      test:
        regex: "animation:\\s*marquee|@keyframes\\s+marquee"

  # ---------------------------------------------------------------------------
  # Max duration constraint
  # ---------------------------------------------------------------------------
  max_interaction_duration:
    id: "motion.max-duration"
    severity: "error"
    type: "constraint"
    value: "500ms"
    description: "User-triggered transitions (hover, click) must not exceed this"
    test:
      max: 500

  # ---------------------------------------------------------------------------
  # Reduced motion -- REQUIRED
  # ---------------------------------------------------------------------------
  reduced_motion:
    id: "motion.reduced-motion"
    severity: "error"
    type: "pattern"
    required: true
    description: "All animations MUST respect prefers-reduced-motion"
    media_query: "@media (prefers-reduced-motion: reduce)"
    fallback_patterns:
      - pattern: "transition"
        replacement: "transition-duration: 0.01ms !important"
        description: "Collapse transition durations"
      - pattern: "animation"
        replacement: "animation-duration: 0.01ms !important; animation-iteration-count: 1 !important"
        description: "Collapse animation durations, stop infinite loops"
      - pattern: "transform"
        replacement: "transform: none !important"
        description: "Remove transforms"
        severity: "warning"
    global_css: |
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

  # ---------------------------------------------------------------------------
  # Hover media query -- REQUIRED for hover effects
  # ---------------------------------------------------------------------------
  hover_gate:
    id: "motion.hover-gate"
    severity: "error"
    type: "pattern"
    required: true
    media_query: "@media (hover: hover) and (pointer: fine) and (prefers-reduced-motion: no-preference)"
    description: "All :hover effects must be wrapped in this media query to prevent sticky hover on touch devices and respect reduced-motion preference"
    test:
      regex: "hover:\\s*hover.*pointer:\\s*fine.*prefers-reduced-motion:\\s*no-preference"
    example_css: |
      @media (hover: hover) and (pointer: fine) {
        .card:hover {
          transform: translateY(-4px);
        }
      }


# =============================================================================
# 3D COMPOSITION (narrative integration)
# =============================================================================
three_d_composition:
  # ---------------------------------------------------------------------------
  # Narrative role mapping for 3D scenes
  # ---------------------------------------------------------------------------
  narrative_roles:
    id: "three-d.narrative-roles"
    type: "reference"
    description: "3D scenes serve narrative roles within the composition framework. The role determines complexity, interaction model, and performance budget."
    hook:
      usage: "Atmospheric background (waveform, particle field)"
      interaction: "Passive or subtle parallax"
      max_bundle: "1.5MB"
      fps_target: 60
    evidence:
      usage: "Product showcase (hardware exploder, component cutaway)"
      interaction: "Scroll-driven reveal, step-by-step"
      max_bundle: "2MB"
      fps_floor: 30
    turn:
      usage: "Data visualization (3D chart, real-time render)"
      interaction: "Interactive (hover, rotate)"
      max_bundle: "1MB"
      note: "Lazy-loaded, not in critical path"
    proof:
      usage: "Static 3D render (product photo replacement)"
      interaction: "None (pre-rendered image)"
      runtime_cost: "0"

  # ---------------------------------------------------------------------------
  # Scroll-driven hardware exploder rules
  # ---------------------------------------------------------------------------
  hardware_exploder:
    id: "three-d.hardware-exploder"
    type: "reference"
    description: "Scroll-driven product reveal for hardware pages. One layer per scroll viewport. Outside-in reveal order. Engineering annotations, not marketing copy."
    pacing: "One reveal per scroll viewport"
    reveal_order: "Outside in -- enclosure, sensing layer, processing layer"
    annotation_font: "JetBrains Mono, uppercase, 0.05em tracking, muted color"
    annotation_style: "Engineering documentation, not marketing copy"
    exit_state: "Hero-angle still after full reveal; scene does not follow scroll"
    fallback: "High-resolution static images of each reveal step, vertical stack"
    rules:
      - id: "three-d.hardware-exploder.no-inform"
        description: "Do not use scroll-driven 3D on inform pages. 3D adds visual weight that conflicts with metronomic rhythm."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this inform-purpose page contain a scroll-driven 3D scene (WebGL canvas, Three.js, scroll-triggered 3D animation)? Answer YES if an inform page uses scroll-driven 3D, NO if it does not."
      - id: "three-d.hardware-exploder.no-convert"
        description: "Do not use 3D on convert pages. 3D is a distraction from the single action."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this convert-purpose page contain a 3D scene (WebGL canvas, Three.js, 3D animation)? Answer YES if a convert page uses 3D, NO if it does not."
      - id: "three-d.hardware-exploder.fallback-required"
        description: "Every scroll-driven 3D scene must have a static image fallback for devices without WebGL."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does every scroll-driven 3D scene on this page have a static image fallback (noscript img, picture element, or hidden static version) for devices without WebGL support? Answer YES if any 3D scene lacks a fallback, NO if all have fallbacks."


# =============================================================================
# COMPONENTS
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Border radius scale
  # ---------------------------------------------------------------------------
  radius:
    base:
      value: "0.625rem"    # 10px -- Patina canonical
      description: "Primary radius. www should migrate from 0.5rem."
    sm:
      value: "calc(0.625rem - 4px)"  # ~6px
      description: "Tight radius -- inner elements, badges"
    md:
      value: "calc(0.625rem - 2px)"  # ~8px
      description: "Medium radius -- inputs, small cards"
    lg:
      value: "0.625rem"    # 10px -- same as base
      description: "Large radius -- cards, dialogs"
    xl:
      value: "calc(0.625rem + 4px)"  # ~14px
      description: "Extra large -- modals, prominent surfaces"
    full:
      value: "9999px"
      description: "Pill shape -- tags, badges, avatars"
    button:
      value: "calc(0.625rem - 2px)"  # ~8px -- Patina canonical
      description: "Button radius -- Patina canonical (~8px). See button_www_legacy for www override."
    button_www_legacy:
      value: "0.375rem"    # 6px
      description: "www legacy button radius (6px). Pending migration to Patina canonical."
    www_legacy:
      value: "0.5rem"      # 8px
      description: "www's current --radius. Should migrate to base (0.625rem)."
      deprecated: true

  # ---------------------------------------------------------------------------
  # Focus indicator requirements
  # ---------------------------------------------------------------------------
  focus:
    id: "components.focus"
    type: "value"
    required: true
    style: "outline"
    outline_width: "2px"
    outline_style: "solid"
    outline_offset: "2px"
    outline_color:
      light: "oklch(0.705 0.015 286.067)"   # neutral.400
      dark: "oklch(0.552 0.016 285.938)"     # neutral.500
      www_override: "oklch(0.55 0.12 160)"   # www-ring (green-shifted, should migrate)
    css: "outline: 2px solid var(--ring); outline-offset: 2px"
    rules:
      - id: "components.focus.no-outline-none"
        description: "Never use outline: none without a visible alternative"
        type: "pattern"
        pattern: "outline:\\s*none"
        severity: "error"
        exception: "Only if replaced by box-shadow or border focus indicator"
        test:
          regex: "outline:\\s*none"
      - id: "components.focus.visible-both-modes"
        description: "Focus indicators must be visible in both light and dark modes"
        type: "constraint"
        severity: "error"
        test:
          llm_eval: "Does every interactive element's focus indicator remain visible in both light and dark modes? Answer YES if any focus indicator is invisible or nearly invisible in either mode, NO if all are visible in both."
      - id: "components.focus.not-color-only"
        description: "Focus must not rely solely on color change"
        type: "constraint"
        severity: "error"
        test:
          llm_eval: "Does any interactive element indicate focus using only a color change (no outline, border, shadow, or other non-color visual change)? Answer YES if focus relies solely on color, NO if a non-color indicator is present."

  # ---------------------------------------------------------------------------
  # Button styling rules
  # ---------------------------------------------------------------------------
  buttons:
    primary:
      background: "oklch(0.21 0.006 285.885)"    # neutral.900
      text_color: "oklch(0.985 0 0)"              # neutral.50
      hover_background: "oklch(0.21 0.006 285.885 / 0.9)"
      border_radius: "calc(0.625rem - 2px)"        # Patina canonical -- 8px
      font_weight: 600
      min_height: "2.5rem"                         # 40px -- touch target
      min_width: "6rem"
      padding: "0.5rem 1rem"
    secondary:
      background: "transparent"
      text_color: "oklch(0.21 0.006 285.885)"     # neutral.900
      border: "1px solid oklch(0.92 0.004 286.32)" # neutral.200
      hover_background: "oklch(0.967 0.001 286.375)" # neutral.100
      border_radius: "calc(0.625rem - 2px)"          # Patina canonical -- 8px
      font_weight: 600
      min_height: "2.5rem"
      padding: "0.5rem 1rem"
    ghost_on_dark:
      id: "components.buttons.ghost-on-dark"
      severity: "error"
      type: "value"
      description: "Ghost button for dark backgrounds -- transparent with white border. Used for secondary hero CTAs. Validated across 7/12 B2B infra competitor audits."
      usage_guidance: |
        Use ghost (secondary) for light backgrounds (section-bg, section-alt-bg, context, evidence).
        Use ghost-on-dark for dark backgrounds (hook, close, dark hero sections).
        The distinction is about contrast: secondary uses neutral.200 border on white,
        ghost-on-dark uses white/60 border on dark. Using the wrong variant fails WCAG contrast.
        Rule of thumb: if the section uses --section-hook-bg or --section-close-bg, use ghost-on-dark.
      context: "dark_background"
      background: "transparent"
      text_color: "oklch(1 0 0)"                    # white
      border: "1px solid oklch(1 0 0 / 0.6)"        # white/60
      hover_background: "oklch(1 0 0 / 0.1)"        # white/10
      border_radius: "calc(0.625rem - 2px)"            # Patina canonical -- 8px
      font_weight: 600
      min_height: "2.5rem"                           # 40px -- touch target
      padding: "0.5rem 1rem"
      requires_hover_query: true
      test:
        regex: "border-white\\/60|border-color:\\s*oklch\\(1\\s+0\\s+0\\s*\\/\\s*0?\\.?6"
    rules:
      - id: "components.buttons.touch-target"
        description: "Buttons must have min 44px touch target (WCAG 2.5.5)"
        type: "constraint"
        min_touch_target: "44px"
        severity: "warning"
        test:
          min: 44
      - id: "components.buttons.min-weight"
        description: "Button text must not use font-weight below 600"
        type: "constraint"
        severity: "error"
        test:
          min: 600
      - id: "components.buttons.disabled-state"
        description: "Disabled buttons must have reduced opacity (0.5) and cursor: not-allowed"
        type: "pattern"
        severity: "error"

  # ---------------------------------------------------------------------------
  # Form components (Z2O-1041)
  # ---------------------------------------------------------------------------
  forms:
    id: "components.forms"
    type: "reference"
    description: "Form field styling rules for inputs, labels, textareas, selects, and error states. Covers light and dark contexts. Dark mode rules apply inside close sections and dark accent moments."

    input:
      id: "components.forms.input"
      severity: "warning"
      type: "value"
      description: "Text input, email, number, phone, and URL fields."
      light:
        background: "oklch(0.985 0 0)"               # neutral.50
        border: "oklch(0.92 0.004 286.32)"            # neutral.200 (semantic input token)
        border_radius: "calc(0.625rem - 2px)"           # Patina canonical button/input radius -- 8px
        text_color: "oklch(0.141 0.005 285.823)"      # neutral.950
        placeholder_color: "oklch(0.552 0.016 285.938)" # neutral.500 (muted-foreground)
        font_family: "Inter"
        font_size: "0.875rem"                         # 14px
        min_height: "2.5rem"                          # 40px -- WCAG 2.5.5 touch target
        max_height: "3rem"                            # 48px -- taller loses proportion
        padding: "0.5rem 0.75rem"
        shadow: "0 1px 2px 0 rgb(0 0 0 / 0.05)"      # shadow-xs (form control pattern)
      dark:
        background: "oklch(0.274 0.006 286.033)"      # neutral.800
        border: "oklch(1 0 0 / 0.15)"                 # semi-transparent white
        text_color: "oklch(0.985 0 0)"                # neutral.50
        placeholder_color: "oklch(0.552 0.016 285.938)" # neutral.500
      focus:
        border_color: "oklch(0.75 0.1286 191.57)"     # brand verdigris
        shadow_light: "0 0 0 3px oklch(0.75 0.1286 191.57 / 0.2)"  # teal at 20%
        shadow_dark: "0 0 0 3px oklch(0.75 0.1286 191.57 / 0.25)"  # teal at 25% (more visible on dark)
      disabled:
        opacity: 0.5
        cursor: "not-allowed"
      rules:
        - id: "components.forms.input.touch-target"
          description: "Form inputs must have min 2.5rem (40px) height for WCAG 2.5.5 touch target compliance."
          severity: "warning"
          type: "constraint"
          test:
            min: 40

    textarea:
      id: "components.forms.textarea"
      type: "reference"
      description: "Long-form text input. Same styling as input, but with vertical resize and min 6rem height."
      min_height: "6rem"                              # 96px -- room for multi-line input
      max_height: "20rem"                             # 320px -- prevent page takeover
      resize: "vertical"

    label:
      id: "components.forms.label"
      severity: "warning"
      type: "value"
      description: "Form field labels. Must be visually associated with their input."
      font_family: "Inter"
      font_weight: 500                                # medium -- lighter than headings (700), heavier than body (400)
      font_size: "0.875rem"                           # 14px
      light:
        color: "oklch(0.21 0.006 285.885)"            # neutral.900
      dark:
        color: "oklch(0.705 0.015 286.067)"           # neutral.400 (muted-fg in dark)
      margin_bottom: "0.5rem"                         # 8px gap between label and input
      rules:
        - id: "components.forms.label.association"
          description: "Every form input must have an associated label via for/id or wrapping. Unlabeled inputs fail WCAG 1.3.1."
          severity: "error"
          type: "constraint"
          test:
            llm_eval: "Does every visible form input (input, select, textarea) have an associated label element (via for/id pairing, wrapping label, or aria-label/aria-labelledby)? Answer YES if any input lacks a label association, NO if all inputs are labeled."

    helper_text:
      id: "components.forms.helper-text"
      type: "value"
      description: "Descriptive text below a field. Provides context or format hints."
      font_size: "0.75rem"                            # 12px
      light:
        color: "oklch(0.552 0.016 285.938)"           # neutral.500 (muted-foreground)
      dark:
        color: "oklch(0.552 0.016 285.938)"           # same in dark -- muted stays muted
      margin_top: "0.375rem"                          # 6px above helper text

    error_text:
      id: "components.forms.error-text"
      type: "value"
      description: "Validation error message below a field. Uses destructive color."
      font_size: "0.75rem"                            # 12px
      color: "var(--color-semantic-destructive)"       # red (mode-aware)
      margin_top: "0.375rem"
      rules:
        - id: "components.forms.error-text.aria"
          description: "Error messages must be associated with their input via aria-describedby. Screen readers must announce the error."
          severity: "error"
          type: "constraint"
          test:
            regex: "aria-describedby"

    submit_button:
      id: "components.forms.submit-button"
      type: "reference"
      description: "Submit button inherits components.buttons rules. On dark contexts, uses teal-filled variant (bg brand teal, text neutral.950)."
      dark_context:
        background: "oklch(0.75 0.1286 191.57)"       # brand verdigris
        text_color: "oklch(0.141 0.005 285.823)"      # neutral.950
        hover_background: "oklch(0.7 0.12 191.57)"    # slightly darker teal
        border_radius: "calc(0.625rem - 2px)"          # Patina canonical -- 8px
        font_weight: 600
        min_height: "2.5rem"
        padding: "0.625rem 1.5rem"

    spacing:
      id: "components.forms.spacing"
      type: "value"
      description: "Vertical rhythm between form elements."
      field_gap: "1.25rem"                            # 20px between fields
      section_gap: "2rem"                             # 32px between field groups
      form_max_width: "32rem"                         # 512px -- optimal form width

  # ---------------------------------------------------------------------------
  # Dark mode token swap rules
  # ---------------------------------------------------------------------------
  dark_mode_tokens:
    description: "Required token swaps when .dark class or prefers-color-scheme: dark"
    swaps:
      - token: "background"
        light: "oklch(1 0 0)"                     # white
        dark: "oklch(0.141 0.005 285.823)"         # neutral.950
      - token: "foreground"
        light: "oklch(0.141 0.005 285.823)"        # neutral.950
        dark: "oklch(0.985 0 0)"                   # neutral.50
      - token: "card"
        light: "oklch(1 0 0)"                      # white
        dark: "oklch(0.21 0.006 285.885)"          # neutral.900
      - token: "muted"
        light: "oklch(0.967 0.001 286.375)"        # neutral.100
        dark: "oklch(0.274 0.006 286.033)"         # neutral.800
      - token: "muted-foreground"
        light: "oklch(0.552 0.016 285.938)"        # neutral.500
        dark: "oklch(0.705 0.015 286.067)"         # neutral.400
      - token: "border"
        light: "oklch(0.92 0.004 286.32)"          # neutral.200
        dark: "oklch(1 0 0 / 0.1)"                 # white/10% -- semi-transparent (matches dark-mode.md)
      - token: "ring"
        light: "oklch(0.705 0.015 286.067)"        # neutral.400
        dark: "oklch(0.552 0.016 285.938)"         # neutral.500
      - token: "destructive"
        light: "oklch(0.577 0.245 27.325)"
        dark: "oklch(0.704 0.191 22.216)"
    rules:
      - id: "components.dark-mode.light-dark-pair"
        description: "Every semantic color token must have both light and dark values"
        type: "constraint"
        severity: "error"
        test:
          llm_eval: "Does every semantic color token (background, foreground, card, muted, border, ring, destructive, etc.) have both a light and a dark value defined? Answer YES if any token is missing a dark or light counterpart, NO if all tokens have both."
      - id: "components.dark-mode.no-pure-black"
        description: "Dark mode must not use pure black (#000000) as background"
        type: "pattern"
        severity: "error"
        test:
          regex: "\\.dark[^}]*background[^;]*#000000|background[^;]*#000(?:;|\\s)"
      - id: "components.dark-mode.translucent-borders"
        description: "Dark mode borders should use semi-transparent values for depth"
        type: "pattern"
        severity: "warning"
      - id: "components.dark-mode.code-block-bg"
        description: "Code blocks (pre) must have distinct background from page in dark mode -- use neutral.800 not neutral.950"
        type: "value"
        severity: "error"
      - id: "components.dark-mode.link-distinction"
        description: "Links must be visually distinguishable from body text in dark mode -- use brand teal or underline"
        type: "constraint"
        severity: "error"
        test:
          llm_eval: "In dark mode, are links visually distinguishable from surrounding body text (via color difference, underline, or other non-color indicator)? Answer YES if any link is indistinguishable from body text in dark mode, NO if all links are clearly distinct."
      - id: "components.dark-mode.persist-preference"
        description: "Dark mode preference must persist across page navigation via localStorage"
        type: "pattern"
        severity: "error"
      - id: "components.dark-mode.head-init"
        description: "Dark mode init must run before first paint (in <head>, not <body>) to prevent FOUC"
        type: "pattern"
        severity: "error"

  # ---------------------------------------------------------------------------
  # CTA link pattern (homepage overhaul -- Z2O-995)
  # ---------------------------------------------------------------------------
  cta_link:
    id: "components.cta-link"
    severity: "warning"
    type: "value"
    description: "CTA inline link -- medium weight (not semibold), with hover-gated underline animation. Typographically lighter than buttons. Distinct from button link variant."
    font_weight: 500                                # Intentional: 500 not 600 -- CTA links are lighter than buttons
    text_decoration: "none"
    hover_text_decoration: "underline"
    hover_underline_offset: "4px"
    requires_hover_query: true
    css: "font-medium no-underline hover:underline underline-offset-4"
    test:
      regex: "cta-link|font-medium[^;]*hover:.*underline"

  # ---------------------------------------------------------------------------
  # CTA arrow link pattern (page section patterns)
  # ---------------------------------------------------------------------------
  cta_arrow_link:
    id: "components.cta-arrow-link"
    severity: "warning"
    type: "value"
    description: "Inline CTA link with trailing arrow. Gap between text and arrow expands on hover. Used in section CTAs where a full button is too heavy. Distinct from cta-link (which uses underline hover)."
    font_weight: 500                                # Matches cta-link weight -- lighter than buttons
    color: "var(--color-brand-verdigris)"            # Brand teal -- signals interactivity on light bg
    arrow_character: "→"
    display: "inline-flex"
    align_items: "center"
    min_gap: "0.25rem"                              # 4px -- default gap
    max_gap: "0.5rem"                               # 8px -- hover gap (the expansion target)
    transition: "gap 200ms ease"                    # duration.normal + easing.default
    requires_hover_query: true
    test:
      regex: "gap.*transition|transition.*gap"

  # ---------------------------------------------------------------------------
  # Stats row pattern (homepage overhaul -- Z2O-995)
  # ---------------------------------------------------------------------------
  stats_row:
    id: "components.stats-row"
    severity: "warning"
    type: "value"
    description: "Stats display row -- large numbers in primary color, uppercase labels with tracking. Used for trust/metric bars on homepage and landing pages."
    number:
      color: "var(--color-semantic-primary)"
      font_family: "display"                        # Lato -- display font for visual impact
      font_weight: 700
      min_size: "2rem"                              # 32px -- large enough for visual impact
      max_size: "3.5rem"                            # 56px -- larger loses hierarchy with headings
    label:
      text_transform: "uppercase"
      letter_spacing: "0.05em"                      # Matches typography.letter-spacing.uppercase rule
      font_weight: 500
      min_size: "0.6875rem"                         # 11px -- readable at smallest
      max_size: "0.875rem"                          # 14px -- larger competes with stat number
      color: "var(--color-semantic-muted-foreground)"
    min_count: 3                                    # fewer looks sparse
    max_count: 4                                    # more overwhelms
    layout: "horizontal"
    responsive: "stack vertical below sm (640px)"

  # ---------------------------------------------------------------------------
  # Logo marquee bar (homepage overhaul -- Z2O-995)
  # ---------------------------------------------------------------------------
  logo_marquee_bar:
    id: "components.logo-marquee-bar"
    severity: "warning"
    type: "reference"
    description: "Trust bar with scrolling logos. Requires overflow-hidden container, duplicated logo set for seamless loop. Animation defined in motion.patterns.logo-marquee."
    overflow: "hidden"
    logo_min_height: "1.25rem"                      # 20px -- readable at smallest size
    logo_max_height: "2rem"                         # 32px -- consistent sizing
    logo_opacity: 0.7                               # Muted to avoid competing with content
    min_gap: "2rem"                                 # 32px -- minimum breathing room
    max_gap: "4rem"                                 # 64px -- wider loses visual grouping
    animation_ref: "motion.patterns.logo-marquee"
    requires_reduced_motion: true                   # Falls back to static display
    display_mode_threshold:
      static_max: 5                                 # 5 or fewer logos: static grid, no animation
      marquee_min: 6                                # 6+ logos: marquee scroll
      description: "Static grid for ≤5 logos (all visible, no motion needed). Marquee for 6+ (too many for a row without overflow). Avoids gratuitous animation on sparse trust bars and prevents horizontal overflow on dense ones."

  # ---------------------------------------------------------------------------
  # Dark image container (homepage overhaul -- Z2O-995)
  # ---------------------------------------------------------------------------
  dark_image_container:
    id: "components.dark-image-container"
    severity: "warning"
    type: "value"
    description: "Dark wrapper (bg-neutral-900) for showcasing dark-themed screenshots/images on light pages. Prevents jarring contrast between light page and dark UI screenshots."
    background: "oklch(0.21 0.006 285.885)"         # neutral.900
    border_radius: "0.625rem"                       # base radius
    min_padding: "1.5rem"                           # 24px -- tighter for small images
    max_padding: "3rem"                             # 48px -- wider for hero-scale screenshots
    overflow: "hidden"

  # ---------------------------------------------------------------------------
  # CTA strip cards (homepage overhaul -- Z2O-995)
  # ---------------------------------------------------------------------------
  cta_strip_cards:
    id: "components.cta-strip-cards"
    severity: "warning"
    type: "reference"
    description: "Multi-card horizontal strip with hover-lift. Each card is a CTA with heading, description, and optional icon. Uses motion.patterns.hover-lift for hover state."
    layout: "horizontal"
    gap: "1.5rem"                                   # 24px
    card_min_width: "16rem"                         # 256px
    card_max_width: "24rem"                         # 384px -- wider loses card proportion
    card_padding: "1.5rem"                          # 24px
    card_border_radius: "0.625rem"                  # base radius
    hover_effect_ref: "motion.patterns.hover-lift"
    requires_hover_query: true
    responsive: "scroll horizontal on mobile, grid on desktop"


# =============================================================================
# BREAKPOINTS
# =============================================================================
breakpoints:
  # ---------------------------------------------------------------------------
  # Standard breakpoints (Tailwind defaults)
  # ---------------------------------------------------------------------------
  standard:
    sm:
      value: "640px"
      rem: "40rem"
      description: "Small -- landscape phones, small tablets"
    md:
      value: "768px"
      rem: "48rem"
      description: "Medium -- tablets"
    lg:
      value: "1024px"
      rem: "64rem"
      description: "Large -- small laptops, landscape tablets"
    xl:
      value: "1280px"
      rem: "80rem"
      description: "Extra large -- desktops"
    "2xl":
      value: "1536px"
      rem: "96rem"
      description: "2X large -- large desktops"

  # ---------------------------------------------------------------------------
  # Patina custom breakpoints (ultra-wide displays)
  # ---------------------------------------------------------------------------
  patina_custom:
    "3xl":
      value: "1792px"
      rem: "112rem"
      description: "Patina custom -- wide monitors"
    "4xl":
      value: "2048px"
      rem: "128rem"
      description: "Patina custom -- 2K displays"
    "5xl":
      value: "2304px"
      rem: "144rem"
      description: "Patina custom -- ultrawide"
    "6xl":
      value: "2560px"
      rem: "160rem"
      description: "Patina custom -- QHD"
    "7xl":
      value: "2816px"
      rem: "176rem"
      description: "Patina custom -- large ultrawide"
    "8xl":
      value: "3072px"
      rem: "192rem"
      description: "Patina custom -- 4K and beyond"

  # ---------------------------------------------------------------------------
  # Migration notes
  # ---------------------------------------------------------------------------
  migration:
    www_tablet:
      id: "breakpoints.migration.www-tablet"
      type: "value"
      current: "991px"
      target: "1024px"
      target_token: "lg"
      description: "www uses 991px for heading/padding responsive breakpoint. Should migrate to standard lg (1024px)."
      severity: "warning"
      affected:
        - "heading responsive sizes (h1, h2, h3)"
        - "padding-global responsive switch"
        - "section-pad-large responsive switch"

  # ---------------------------------------------------------------------------
  # Enforcement
  # ---------------------------------------------------------------------------
  rules:
    - id: "breakpoints.custom-banned"
      description: "Custom breakpoints outside the standard + patina set are flagged"
      type: "pattern"
      severity: "warning"
    - id: "breakpoints.mobile-first"
      description: "Mobile-first approach: use min-width media queries"
      type: "pattern"
      severity: "warning"
      test:
        regex: "max-width:\\s*\\d+px"


# =============================================================================
# ELEVATION
# =============================================================================
elevation:
  # ---------------------------------------------------------------------------
  # Shadow scale -- only these tokens are allowed
  # Source: tokens/elevation/shadow.json (Tailwind v4 defaults from Patina)
  # ---------------------------------------------------------------------------
  shadows:
    allowed_tokens:
      none:
        value: "none"
        usage: "Reset/removal -- sidebar-header, input-group, toggle-group flush"
      xs:
        value: "0 1px 2px 0 rgb(0 0 0 / 0.05)"
        usage: "Form controls -- input, textarea, select, checkbox, switch, button (outline)"
      sm:
        value: "0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)"
        usage: "Containers -- card, slider thumb, tabs (active), sidebar (floating)"
      md:
        value: "0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)"
        usage: "Floating elements -- dropdown, select content, popover, hover-card"
      lg:
        value: "0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)"
        usage: "Overlays -- dialog, alert-dialog, sheet, dropdown sub-content"
      xl:
        value: "0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)"
        usage: "Maximum elevation -- chart tooltips"
    rules:
      - id: "elevation.shadows.no-adhoc"
        description: "Ad-hoc box-shadow values are banned -- use shadow tokens (none/xs/sm/md/lg/xl)"
        type: "pattern"
        severity: "error"
        detection: "box-shadow values not matching any allowed_tokens value"
        exception: "sidebar-border shadow (outline-as-shadow pattern)"
      - id: "elevation.shadows.context-match"
        description: "Shadow elevation must match component context (e.g., cards use sm, modals use lg)"
        type: "constraint"
        severity: "warning"
        test:
          llm_eval: "Does each component use the correct shadow token for its context (xs for form controls, sm for cards, md for dropdowns/popovers, lg for dialogs/sheets, xl for tooltips)? Answer YES if any component uses a shadow token that does not match its context, NO if all shadow usage matches the expected elevation."
      - id: "elevation.shadows.hover-transition"
        description: "Hover states that add shadow must transition from a lower token, not from none to lg"
        type: "constraint"
        severity: "warning"
        test:
          llm_eval: "Do any hover states jump more than one shadow level (e.g., from none directly to lg or xl, skipping intermediate tokens)? Answer YES if any hover transition skips more than one shadow level, NO if all hover shadow transitions are incremental."

  # ---------------------------------------------------------------------------
  # Z-index layers -- strict layer system
  # Source: tokens/elevation/z-index.json (Tailwind v4 defaults from Patina)
  # ---------------------------------------------------------------------------
  z_index:
    allowed_layers:
      base:
        value: 0
        usage: "Default stacking context"
      scrollbar:
        value: 1
        usage: "Scroll-area scrollbar thumb"
      raised:
        value: 10
        usage: "Locally raised -- sidebar panel, resize handle, focused group item"
      sticky:
        value: 20
        usage: "Sticky/resize affordances -- sidebar resize handle"
      overlay:
        value: 50
        usage: "Top-level overlays -- dialog, sheet, dropdown, popover, tooltip, header"
    rules:
      - id: "elevation.z-index.no-custom"
        description: "Custom z-index values outside the allowed layer set are banned"
        type: "pattern"
        severity: "error"
        detection: "z-index values not matching 0, 1, 10, 20, or 50"
        exception: "Negative z-index for stacking context tricks (z-[-1])"
        test:
          values: [0, 1, 10, 20, 50]
      - id: "elevation.z-index.max-50"
        description: "Z-index must not exceed 50 -- no z-[999] or z-[9999] hacks"
        type: "constraint"
        severity: "error"
        test:
          max: 50
      - id: "elevation.z-index.overlay-backdrop"
        description: "Elements at z-overlay (50) must have a backdrop or dismiss mechanism"
        type: "constraint"
        severity: "warning"
        test:
          llm_eval: "Does every element using z-index 50 (overlay layer) have either a visible backdrop overlay or a dismiss mechanism (click-outside, Escape key, close button)? Answer YES if any z-50 element lacks both backdrop and dismiss, NO if all have at least one."
      - id: "elevation.z-index.stacking-context"
        description: "Z-index should only be set on elements that create a stacking context"
        type: "constraint"
        severity: "warning"
        test:
          llm_eval: "Is z-index applied to any element that does not create a stacking context (i.e., missing position relative/absolute/fixed/sticky, or transform, or opacity less than 1)? Answer YES if z-index is set on a non-stacking-context element, NO if all z-index usage is on proper stacking contexts."


# =============================================================================
# ACCESSIBILITY (retained from v0.1.0, cross-references color/components)
# =============================================================================
accessibility:
  require_alt_text: true
  require_aria_labels: true
  require_focus_indicators: true   # See components.focus for specifics
  min_contrast_ratio: 4.5          # See color.contrast for full breakdown
  touch_target_min: "44px"         # WCAG 2.5.5
  rules:
    - id: "accessibility.alt-text"
      description: "Images must have alt text (empty string for decorative)"
      type: "pattern"
      severity: "error"
      test:
        regex: "<img(?![^>]*alt=)"
    - id: "accessibility.aria-names"
      description: "Interactive elements must have accessible names"
      type: "pattern"
      severity: "error"
    - id: "accessibility.not-color-only"
      description: "Color must not be the sole means of conveying information"
      type: "constraint"
      severity: "error"
      test:
        llm_eval: "Is color used as the sole means of conveying information anywhere (e.g., error states indicated only by red text, status shown only by color, links distinguished only by color)? Answer YES if color is the only indicator, NO if a non-color cue (icon, underline, text label, pattern) is also present."
    - id: "accessibility.text-resize"
      description: "Text resizing to 200% must not break layout"
      type: "constraint"
      severity: "warning"
      test:
        llm_eval: "When text is resized to 200% (browser zoom or font-size override), does any content overflow its container, get clipped, or overlap other elements? Answer YES if layout breaks at 200% text size, NO if layout adapts without content loss."


# =============================================================================
# DEVICE ACCESSIBILITY -- Verdigris runs on many devices, not just Chrome desktop
# =============================================================================
# Verdigris surfaces run on firmware displays, mobile (iOS Safari, Android
# Chrome), web (Chrome, Firefox, Safari, Edge), and embedded dashboards.
# A design that only works on Chrome desktop is a design that excludes
# customers. This section codifies the cross-browser and device testing
# floor for every shipped surface.
# =============================================================================

device_accessibility:
  browser_baseline:
    web: ["chrome_latest", "firefox_latest", "safari_latest", "edge_latest"]
    mobile: ["ios_safari_latest", "android_chrome_latest"]
    firmware: ["embedded_webkit"]
  min_target_size_touch: "44px"
  min_target_size_pointer: "24px"
  rules:
    - id: "device.canvas-cross-browser-parity"
      description: "Canvas rendering must be visually equivalent across Chrome, Firefox, Safari. Bezier math, compositing, text measurement, and DPR scaling all differ subtly between engines -- never rely on implementation-specific behavior."
      type: "constraint"
      severity: "error"
      test:
        llm_eval: "Does this canvas code depend on browser-specific rendering behavior (e.g., computing paths manually that differ from drawn paths, assuming Chrome compositing ordering, hardcoded DPR assumptions)? Answer YES if the code will render differently on Firefox or Safari, NO if the math and drawing ops are browser-agnostic and produce visually identical output."

    - id: "device.math-matches-drawing"
      description: "When computing a path for animation or hit-testing that must align with a drawn path, use identical math. If the drawn path is a cubic bezier, the computed path must use cubic bezier math (4 control points). Quadratic and cubic bezier with the same endpoints produce different curves."
      type: "constraint"
      severity: "error"
      test:
        llm_eval: "Are there any cases where code computes a point on a curve (e.g., for particle animation or hit testing) using math that does not match the actual drawn curve type (quadratic vs cubic vs arc)? Answer YES if computed and drawn paths diverge, NO if they use identical curve math."

    - id: "device.test-on-multiple-browsers"
      description: "Every canvas visualization and complex interactive surface must be tested on Chrome, Firefox, and Safari before shipping. Cross-browser testing is not optional -- it catches canvas rendering differences, font-metric drift, CSS subpixel rounding, and color profile mismatches."
      type: "process"
      severity: "error"

    - id: "device.test-on-mobile"
      description: "Every customer-facing surface must be tested on at least one iOS Safari and one Android Chrome device. Touch targets (44px min), viewport behavior, scroll anchoring, pointer events, and performance under constrained memory all behave differently than desktop."
      type: "process"
      severity: "error"

    - id: "device.no-chrome-only-apis"
      description: "Avoid browser-specific APIs without fallbacks: OffscreenCanvas (limited Safari support pre-16.4), BroadcastChannel (limited Safari support), CSS :has() (check baseline), container queries (check baseline). When used, provide feature detection and graceful degradation."
      type: "constraint"
      severity: "warning"
      test:
        llm_eval: "Does this code use any browser-specific APIs (OffscreenCanvas, BroadcastChannel, ResizeObserver without fallback, newer CSS features) without feature detection or graceful degradation? Answer YES if browser-specific APIs are used without fallbacks, NO if feature detection is present or all APIs have universal baseline support."

    - id: "device.dpr-handling"
      description: "Canvas must handle devicePixelRatio correctly and consistently. Multiply canvas.width/height by dpr (capped at 2 for perf), then scale the rendering context. Never hardcode DPR or assume a specific value."
      type: "constraint"
      severity: "error"
      test:
        llm_eval: "Does every canvas setup properly account for devicePixelRatio by scaling canvas buffer and context correctly? Answer YES if any canvas ignores DPR or hardcodes a specific ratio, NO if all canvases handle DPR correctly with an appropriate cap."

    - id: "device.reduced-motion-honored"
      description: "Every animation must check prefers-reduced-motion: reduce and skip to final state, not start continuous loops, and preserve readability without motion."
      type: "constraint"
      severity: "error"
      test:
        llm_eval: "Does every animated element in this code honor prefers-reduced-motion: reduce by skipping animations to a final static state? Answer YES if any animation ignores the preference, NO if all animations check the preference and degrade gracefully."

    - id: "device.firmware-display-constraints"
      description: "Firmware displays (Verdigris sensor nodes, embedded panels) have constrained color, contrast, and refresh characteristics. Designs intended for firmware must be tested on the target display hardware, not assumed from desktop rendering."
      type: "process"
      severity: "warning"


# =============================================================================
# COMPOSITION -- purpose x surface matrix
# =============================================================================
# Composition rules govern how color, typography, and spacing interact.
# Organized by purpose (what the page is trying to do) x surface (what
# medium it's on). Each cell has its own ruleset. The same surface can
# serve different purposes with different composition logic.
#
# Purposes: persuade, inform, analyze, convert, identify, narrate, assist, instruct
# Surfaces: web_page, ad_banner, email, slide_deck, dashboard, hardware, chat
#
# Build incrementally -- only filled cells are enforced.
# =============================================================================

composition:
  # ---------------------------------------------------------------------------
  # Matrix structure (cells marked BUILD NOW are defined below)
  # ---------------------------------------------------------------------------
  matrix:
    id: "composition.matrix"
    type: "reference"
    description: "Purpose x surface composition matrix. AI agents declare both purpose and surface; the evaluator selects the matching cell's ruleset."
    cells:
      persuade_web_page: "defined"
      persuade_ad_banner: "defined"
      persuade_email: "defined"
      persuade_slide_deck: "defined"
      inform_web_page: "defined"
      inform_slide_deck: "defined"
      analyze_dashboard: "defined"
      convert_web_page: "defined"
      identify_ad_banner: "defined"
      identify_hardware: "defined"
      # Narrative / editorial
      narrate_web_page: "defined"        # long-form editorial, design essays, retrospectives
      # LLM/chat surfaces
      assist_chat: "defined"             # human-to-AI conversational interface
      assist_embedded: "defined"         # AI-generated content within other surfaces
      instruct_machine: "defined"        # machine-to-machine (AI agents consuming design system)

  # ---------------------------------------------------------------------------
  # SITE-LEVEL COMPOSITION -- cross-page rules
  # ---------------------------------------------------------------------------
  # Page-level composition governs sections within a page.
  # Site-level composition governs how pages relate across a visit.
  # These rules prevent the site from feeling like a collection of
  # disconnected landing pages.
  # ---------------------------------------------------------------------------
  site_level:
    id: "composition.site-level"
    type: "reference"
    description: "Cross-page composition rules. Pages are self-contained (each earns trust within its own scroll), but visitors who navigate between pages will notice identical composition. The site needs an arc too."

    page_hierarchy:
      id: "composition.site-level.page-hierarchy"
      type: "reference"
      description: "Not all pages have equal visual weight. The homepage is the loudest; secondary pages progressively quiet down."
      tiers:
        primary:
          hero: "Full expression: dark bg, gradient strip, H1, 8rem padding"
          turn_allowed: true
          color_budget: "trust + 1 earned accent"
          example: "Homepage"
          max_pages: 1
        secondary:
          hero: "Compact: neutral.100 or neutral.200 bg, H1 at 3rem, 5rem padding"
          turn_allowed: false
          turn_condition: "page_section_count >= 6"  # enforced in turn-scarcity rule; default false, overridden when condition met
          color_budget: "trust only (teal + neutrals)"
          example: "Product, Platform"
        tertiary:
          hero: "No hero. Section opens directly with H1."
          turn_allowed: false
          color_budget: "trust only"
          example: "Docs, blog posts, legal"
        convert:
          hero: "Minimal: single heading + CTA, neutral or dark bg, no narrative arc"
          turn_allowed: false
          color_budget: "1 accent (CTA only)"
          example: "Pricing, demo request, signup"

    rules:
      - id: "composition.site-level.hero-hierarchy"
        description: "Only the primary page (homepage) uses the full-expression dark hero with gradient strip. Secondary pages use compact or light heroes. Two full-expression heroes in a visitor session feels like two homepages. The site must have exactly one full-expression hero (the homepage)."
        severity: "warning"
        type: "constraint"
        test:
          min_full_expression_heroes: 1   # homepage must have one
          max_full_expression_heroes: 1   # only homepage gets one

      - id: "composition.site-level.turn-scarcity"
        description: "At most one turn moment (earned accent) per 3-page navigation depth. The homepage gets priority. At least one turn must exist across the persuade pages (the homepage). If every page has a turn, the accent becomes wallpaper. If no page has a turn, the brand palette is underused."
        severity: "warning"
        type: "constraint"
        test:
          min_turns_per_site: 1           # at least one turn across persuade pages
          max_turns_per_session_depth: 1
          session_depth_window: 3
          secondary_page_turn_condition: "page_section_count >= 6"

      - id: "composition.site-level.accent-diversity"
        description: "When multiple pages use accent moments, they must use different palette regions. Two identical accents in a session feels like a template, not a design."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Do any two pages that both have accent/turn moments use the same palette region (e.g., both midnight-purple, both cyber-yellow)? Answer YES if accents repeat across pages, NO if they use different regions."
          input_scope: ["all_pages_with_turn_moments"]

      - id: "composition.site-level.purpose-de-escalation"
        description: "Visual intensity should de-escalate as visitors move from persuade toward convert/inform. A convert page should feel like arrival, not another pitch. Transitions: persuade-to-persuade reduces (secondary hero, no turn unless 6+ sections); persuade-to-inform reduces (no hero, metronomic rhythm); persuade-to-convert reduces sharply (minimal hero, single CTA, no turn); inform-to-convert maintains (both low-energy); any-to-narrate resets (own register)."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Given the upstream page (the page that links to this one) and this page, compare their visual intensity (hero weight, accent usage, section count, color budget). Does this page maintain or increase intensity when it should de-escalate? Answer YES if intensity fails to de-escalate, NO if it de-escalates or maintains appropriately."
          input_scope: ["upstream_page", "current_page"]

      - id: "composition.site-level.navigation-continuity"
        description: "Header and footer are compositional invariants across all pages. No per-page header or footer styling. The header is always the lightest element; the footer is always dark. Structural invariant -- violations break site identity across every page."
        severity: "error"
        type: "constraint"
        invariants:
          header: "Lightest element on every page. No per-page styling."
          footer: "Always dark. Same structure across pages."
          breadcrumb: "Teal as functional color (trust region). Not decorative."
        test:
          llm_eval: "Does any page have a header or footer with styling that differs from other pages (different background color, modified structure, per-page color scheme, or unique layout)? Answer YES if a violation exists, NO if header and footer are consistent."

      - id: "composition.site-level.entry-point-awareness"
        description: "Every page works standalone (self-contained rule). When standalone and sequence rules conflict, standalone wins. A product page must earn its own trust even if the visitor skipped the homepage."
        type: "reference"

  # ---------------------------------------------------------------------------
  # VISUAL SIGNATURE -- data-derived brand elements
  # ---------------------------------------------------------------------------
  visual_signature:
    id: "composition.visual-signature"
    type: "reference"
    description: "The Verdigris visual signature derives from the product: 8kHz electrical data made visible. A family of data-derived patterns, not decorative illustration."

    canonical_elements:
      phase_portrait:
        id: "composition.visual-signature.phase-portrait"
        type: "reference"
        description: "V-I Lissajous figure. Each load type produces a unique shape. Primary brand mark candidate."
        use: ["card icons", "hero illustrations", "loading states", "favicon"]
      harmonic_spectrum:
        id: "composition.visual-signature.harmonic-spectrum"
        type: "reference"
        description: "Frequency-domain bars showing harmonic content. Teal only for texture use."
        use: ["section dividers (2-4px)", "card top borders", "dashboard headers"]
        color_constraint: "teal only when used as texture. Full palette only in data_visualization context."
      waveform_trace:
        id: "composition.visual-signature.waveform-trace"
        type: "reference"
        description: "Time-domain 60Hz signal with harmonics. Supporting element, not primary."
        use: ["section separators", "ambient background", "resolution comparisons"]

    rules:
      - id: "composition.visual-signature.no-generic-waves"
        description: "Waveform visualizations must have real harmonic structure (3rd, 5th, 7th harmonics of 60Hz fundamental). Generic sine waves with no harmonic content could belong to any company."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this waveform visualization show only a smooth sine wave with no harmonic content or distortion? Answer YES if it is a generic sine, NO if it has visible harmonic structure."

      - id: "composition.visual-signature.no-decorative-particles"
        description: "Particle systems and dot fields must derive from electrical data concepts (circuit topology, sampling density). Generic floating particles are not brand elements."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this particle/dot visualization represent a specific electrical concept (circuit paths, sampling points, load distribution), or is it a generic decorative particle effect? Answer YES if generic, NO if electrically grounded."

  # ---------------------------------------------------------------------------
  # CANVAS TEXT -- rules for rendering text to Canvas instead of DOM
  # ---------------------------------------------------------------------------
  canvas_text:
    id: "composition.canvas-text"
    type: "reference"
    description: "Rules for when and how to render text via Canvas/Pretext instead of DOM. Canvas text is a significant architectural decision with accessibility implications."

    rules:
      - id: "composition.canvas-text.html-fallback"
        description: "Every Canvas-rendered text element must have an identical HTML fallback using the same typography tokens. The fallback is shown for prefers-reduced-motion and when Canvas is unavailable."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does this Canvas text element have a corresponding HTML fallback that uses the same font family, weight, size, and color? Is the fallback visible when prefers-reduced-motion is active? Answer YES if the fallback is missing or mismatched, NO if it exists and matches."

      - id: "composition.canvas-text.no-body-copy"
        description: "Never render body copy, paragraphs, or readable text to Canvas. Canvas text is for display headings with effects only."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Is body copy, paragraph text, or text meant to be read at length rendered via Canvas instead of DOM? Answer YES if body copy uses Canvas, NO if Canvas is limited to display headings."

      - id: "composition.canvas-text.aria-label"
        description: "Canvas elements rendering text must have role='img' and aria-label matching the text content."
        severity: "error"
        type: "constraint"
        test:
          regex: "role=['\"]img['\"].*aria-label|aria-label.*role=['\"]img['\"]"

  # ---------------------------------------------------------------------------
  # NAMED TEXT EFFECTS -- three specified brand effects
  # ---------------------------------------------------------------------------
  named_effects:
    id: "composition.named-effects"
    type: "reference"
    description: "Three named text effects that are part of the visual signature. Each has exact timing, color, and behavior specs."

    measurement_bar_reveal:
      id: "composition.named-effects.measurement-bar-reveal"
      type: "reference"
      description: "Characters materialize from 1px teal cursor bars that widen to reveal letterforms. Oscilloscope measurement metaphor."
      timing:
        total_duration: "800ms"
        stagger_per_char: "35ms"
        easing: "ease-out (cubic)"
      color:
        bar: "color.brand.verdigris at 40-80% opacity"
        glow: "color.brand.verdigris at 15% opacity, fades during reveal"
        final_text: "color.semantic.foreground"
      constraints:
        max_per_page: 1
        reprise_in_close: true
        use_on: "H1 headlines on dark hero sections (Hook and Close roles)"

    harmonic_typography:
      id: "composition.named-effects.harmonic-typography"
      type: "reference"
      description: "Large display text where digit shapes are clipping masks revealing three-phase waveforms. The text reveals the data."
      timing:
        waveform_speed: "one 60Hz cycle per 500ms"
        pin_duration: "0.5 scroll-heights"
        freeze_on_scroll_past: "800ms ease-out"
      color:
        phase_a: "color.brand.verdigris (teal)"
        phase_b: "color.brand.mp-step-2 (purple)"
        phase_c: "color.brand.cyber-yellow (yellow)"
        non_digit_chars: "solid neutral fill (commas, units are punctuation)"
      constraints:
        max_per_page: 1
        use_on: "key stat numbers in Evidence sections"
        font: "Lato 700, clamp(5rem, 15vw, 12rem)"

    waveform_to_text_reveal:
      id: "composition.named-effects.waveform-to-text-reveal"
      type: "reference"
      description: "Heading starts as continuous oscilloscope trace with real harmonic structure, resolves into readable text with palette sweep."
      timing:
        total_duration: "1200ms"
        easing: "ease-out (cubic)"
      color:
        during_transition: "starts at teal, sweeps through palette, terminates at section's designated accent region"
        final_text: "color.semantic.foreground"
      constraints:
        max_per_page: 1
        use_on: "H2 headings at the Turn section (the earned accent)"
        waveform_structure: "continuous trace across full heading width, 60Hz + 3rd/5th/7th harmonics. NOT per-character random noise."

  # ---------------------------------------------------------------------------
  # AMBIENT WAVEFORM LAYER
  # ---------------------------------------------------------------------------
  ambient_waveform:
    id: "composition.ambient-waveform"
    type: "reference"
    description: "A persistent 60Hz sine wave behind page content. The AC heartbeat. Varies in opacity and harmonic complexity by section role."
    frequency: "60Hz visual cycles per screen width"
    max_opacity: 0.20
    light_mode: "off -- ambient waveform only on dark-background sections"
    reduced_motion: "static thin line at 8% opacity, no animation"
    opacity_by_role:
      hook: { dark: 0.15, light: 0 }
      context: { dark: 0, light: 0 }       # off on context (breathing room)
      evidence: { dark: { min: 0.10, max: 0.15 }, light: 0 }
      turn: { dark: { min: 0.15, max: 0.20 }, light: 0 }
      proof: { dark: 0, light: 0 }         # off on proof (quiet)
      close: { dark: 0.12, light: 0 }
    harmonics_by_role:
      hook: "1st only"
      context: "none"
      evidence: "1st + 3rd"
      turn: "1st + 3rd + 5th"
      proof: "1st only"
      close: "1st + 3rd + 5th (builds through section)"

  # ---------------------------------------------------------------------------
  # DEMONSTRATE x WEB PAGE -- technology showcase composition
  # ---------------------------------------------------------------------------
  demonstrate_web_page:
    id: "composition.demonstrate-web-page"
    type: "reference"
    description: "Technology/Signal page. The data IS the content. Effects demonstrate product capability, not decorate marketing copy."
    register:
      id: "composition.demonstrate-web-page.register"
      type: "reference"
      description: "Revelation earns trust. The page makes invisible data visible. Each section reveals more than the last."
      trust_sequence: "Curiosity (hook) > comprehension (context) > revelation (evidence) > conviction (turn) > credibility (proof) > action (close)"
    page_tier: "secondary"
    hero: "Dark, compact (not full-expression -- homepage owns that)"
    turn_allowed: true
    color_budget: "trust + data_visualization exception for viz sections"
    canvas_effects: "up to 3 named effects per page, exclusive to this cell"
    ambient_layer: "dark sections only"
    interactive_elements: "1 primary (slider or equivalent), secondary interactions on viz elements"
    attention_budget: "max 2 animated elements visible in any single viewport"
    synthetic_data: "must be labeled as representative, not claimed as real measurements"
    reduced_motion_minimum: "at least 1 static phase portrait or harmonic spectrum illustration"
    rules:
      - id: "composition.demonstrate-web-page.effects-serve-content"
        description: "Every Canvas effect on the page must demonstrate a product capability. If removing the effect loses information (not just visual interest), it belongs. If removing it loses nothing, it does not."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this Canvas text effect or data visualization demonstrate a specific product capability (8kHz resolution, fault detection, load identification), or is it purely decorative? Answer YES if purely decorative, NO if it demonstrates capability."

      - id: "composition.demonstrate-web-page.attention-budget"
        description: "At most 2 animated elements visible in any single viewport simultaneously. The ambient waveform counts when opacity exceeds 10%. Named effects count when actively animating. This prevents the page from becoming a tech demo."
        severity: "error"
        type: "constraint"
        test:
          max_simultaneous_animated: 2

      - id: "composition.demonstrate-web-page.effects-exclusive"
        description: "Named text effects (measurement bar reveal, harmonic typography, waveform-to-text reveal) are exclusive to the Demonstrate x Web Page cell. They do not appear on the homepage, product pages, or any other page type."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Are any named Canvas text effects (measurement bar reveal, harmonic typography, waveform-to-text reveal) used on a page that is not the Technology/Signal page? Answer YES if effects appear on other pages, NO if they are restricted to the Technology page."

      - id: "composition.demonstrate-web-page.reading-constraint"
        description: "Heading text must reach full legibility within 600ms (under 40 chars) or 800ms (40+ chars). The animation may continue after legibility but the text must be readable. This prevents effects from blocking comprehension at the highest-stakes moments."
        severity: "error"
        type: "constraint"
        test:
          legibility_deadline_short: "600ms"
          legibility_deadline_long: "800ms"
          threshold_chars: 40

  # ---------------------------------------------------------------------------
  # PERSUADE x WEB PAGE -- homepage, landing pages, campaign pages
  # ---------------------------------------------------------------------------
  # Narrative pacing + coupling rules. Each section has a role in the story.
  # Composition follows from the role. Coupling rules provide a mechanical
  # floor grounded in readability research.
  # ---------------------------------------------------------------------------
  persuade_web_page:
    id: "composition.persuade-web-page"
    type: "reference"
    description: "Composition rules for persuasive web pages (homepage, landing, campaign). Narrative pacing drives color intensity, type scale, and spacing. Coupling rules ensure readability."

    # --- Surface register ---
    # How this surface earns trust. Not enforceable -- guides judgment calls.
    register:
      id: "composition.persuade-web-page.register"
      type: "reference"
      description: "Restraint earns trust. The page opens with conformity signals (precise data, clean layout) and earns permission for boldness through the scroll. The hook is quiet confidence, not spectacle. The turn is the one earned moment where craft shows. Visitors from LLMs arrive with intent -- the page must do all the emotional work by itself."
      trust_sequence: "Conformity (hook) → credibility (evidence) → craft (turn) → conviction (close)"
      dominant_register: "Refined -- generous space, controlled palette, every element earning its place"

    # --- Narrative roles ---
    # Each section on a persuasive page serves a role in the story.
    # The role determines its visual treatment.
    narrative_roles:
      hook:
        id: "composition.persuade-web-page.hook"
        type: "reference"
        description: "First impression. Capture attention, state the value proposition."
        color_intensity: "full"
        type_max: "h1"
        section_padding: "8rem"
        position: "first section"
        elements: ["heading", "subhead", "primary CTA", "ghost-on-dark CTA", "gradient strip"]
      context:
        id: "composition.persuade-web-page.context"
        type: "reference"
        description: "Set up the problem or category. Low visual weight -- let the hook land before adding information."
        color_intensity: "breathing"
        type_max: "h2"
        section_padding: "4rem"
        elements: ["heading", "body copy"]
      evidence:
        id: "composition.persuade-web-page.evidence"
        type: "reference"
        description: "Show proof -- cards, feature grids, technical specs. Supporting visual weight."
        color_intensity: "supporting"
        type_max: "h2"
        section_padding: "4rem"
        elements: ["heading", "body copy", "card grid", "stat highlights"]
      turn:
        id: "composition.persuade-web-page.turn"
        type: "reference"
        description: "Shift the feeling. The one earned accent moment -- this is the conversion point. Pre-attentive capture draws the eye here. Place on the most important value proposition."
        color_intensity: "accent"
        type_max: "h2"
        section_padding: { min: "5rem", max: "10rem" }
        elements: ["heading", "body copy", "stats row", "CTA link"]
        accent_rule: "The turn section gets the palette accent. Choose the palette region that matches the content category (e.g., detection -> energy region)."
      proof:
        id: "composition.persuade-web-page.proof"
        type: "reference"
        description: "Hard numbers, customer logos, deployment scale. Let the evidence breathe after the turn."
        color_intensity: "supporting"
        type_max: "h2"
        section_padding: "4rem"
        elements: ["heading", "body copy", "logo bar", "testimonial"]
      close:
        id: "composition.persuade-web-page.close"
        type: "reference"
        description: "Final CTA. Returns to full expression -- bookends the hook. Dark background, so dark-padding coupling rule applies."
        color_intensity: "full"
        type_max: "h2"
        section_padding: { min: "8rem", max: "14rem" }  # must match dark-padding coupling rule (dark bg)
        position: "last section"
        elements: ["heading", "primary CTA"]

    # --- Narrative arc rules ---
    arc:
      - id: "composition.persuade-web-page.arc.required-roles"
        description: "Every persuasive page must have at least a hook and a close."
        severity: "error"
        type: "constraint"
        test:
          required: ["hook", "close"]
      - id: "composition.persuade-web-page.arc.single-turn"
        description: "At most one turn section per page. The turn is the earned accent moment -- more than one dilutes it."
        severity: "error"
        type: "constraint"
        test:
          max: 1
      - id: "composition.persuade-web-page.arc.max-low-energy"
        description: "No more than 3 consecutive low-energy sections (context, evidence, proof) without a turn or a visual break. Prevents the middle of the page from going flat."
        severity: "warning"
        type: "constraint"
        test:
          max_consecutive: 3
      - id: "composition.persuade-web-page.arc.turn-after-evidence"
        description: "The turn should follow at least one evidence or proof section. The shift hits harder after the reader has absorbed information."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does the page have an accent or highlighted section that appears before any evidence or proof section? Answer YES if the accent comes too early, NO if it follows evidence."

    # --- Minimal arc (short pages with 3-6 sections) ---
    # Product pages, solution pages, and partner pages may only have 3-6 sections.
    # The full arc (hook-context-evidence-turn-proof-close) doesn't fit.
    # Minimal arc: Hook → Evidence → Close. No turn required.
    minimal_arc:
      id: "composition.persuade-web-page.minimal-arc"
      type: "reference"
      description: "For pages with ≤6 sections, a reduced arc is allowed: Hook → Evidence(s) → Close. No turn required -- the page is too short for an earned accent moment to land. The turn rule relaxes, but hook+close remain mandatory."
      applies_when:
        max_sections: 6
      required_roles: ["hook", "close"]
      optional_roles: ["context", "evidence", "proof"]
      turn_required: false
      rules:
        - id: "composition.persuade-web-page.minimal-arc.hook-close"
          description: "Even short persuasive pages need a hook (first) and close (last)."
          severity: "error"
          type: "constraint"
          test:
            required: ["hook", "close"]
        - id: "composition.persuade-web-page.minimal-arc.no-turn-ok"
          description: "Pages with ≤6 sections may omit the turn. The page is too short for the accent to feel earned."
          severity: "info"
          type: "reference"

    # --- Coupling rules (mechanical floor) ---
    # Grounded in readability research. Apply regardless of narrative role.
    coupling:
      color_to_spacing:
        - id: "composition.persuade-web-page.coupling.dark-padding"
          description: "Dark background sections (L < 0.3) need generous padding. Visual weight needs room to breathe. Dark surfaces signal premium when given space. Values are responsive -- mobile gets less padding to avoid wasting screen real estate."
          severity: "warning"
          type: "constraint"
          test:
            when: { background_lightness: { max: 0.3 } }
            then:
              section_padding:
                mobile: { min: "4rem", max: "6rem" }       # < 640px
                tablet: { min: "6rem", max: "10rem" }       # 640-767px
                desktop: { min: "8rem", max: "14rem" }      # 768px+
          note: "8rem is ~20% of a mobile viewport -- too aggressive. 4rem on mobile preserves the generous feel without wasting half the screen."
        - id: "composition.persuade-web-page.coupling.tinted-padding"
          description: "Tinted background sections (chroma > 0.01) need medium padding."
          severity: "warning"
          type: "constraint"
          test:
            when: { background_chroma: { min: 0.01 } }
            then:
              section_padding:
                mobile: { min: "3rem", max: "5rem" }
                tablet: { min: "4rem", max: "7rem" }
                desktop: { min: "5rem", max: "10rem" }
        - id: "composition.persuade-web-page.coupling.neutral-padding"
          description: "Neutral background sections (low chroma, not dark) use standard padding."
          severity: "warning"
          type: "constraint"
          test:
            when: { background_chroma: { max: 0.01 }, background_lightness: { min: 0.3 } }
            then:
              section_padding:
                mobile: { min: "3rem", max: "4rem" }
                tablet: { min: "3rem", max: "5rem" }
                desktop: { min: "4rem", max: "6rem" }
      color_to_typography:
        - id: "composition.persuade-web-page.coupling.tinted-line-height"
          description: "Tinted or dark backgrounds loosen body line-height to 1.65-1.75 for readability."
          severity: "warning"
          type: "constraint"
          test:
            when:
              any_of:
                - { background_chroma: { min: 0.01 } }
                - { background_lightness: { max: 0.3 } }
            then: { body_line_height: { min: 1.65, max: 1.75 } }
        - id: "composition.persuade-web-page.coupling.tinted-line-length"
          description: "Tinted or dark backgrounds use tighter max line length (65ch vs 75ch default). Reduced line length offsets the cognitive load of colored or dark surfaces."
          severity: "warning"
          type: "constraint"
          test:
            when:
              any_of:
                - { background_chroma: { min: 0.01 } }
                - { background_lightness: { max: 0.3 } }
            then: { max_line_length: "65ch" }
        - id: "composition.persuade-web-page.coupling.dark-letter-spacing"
          description: "Body text on dark backgrounds gets slightly looser letter-spacing (+0.01em) for readability."
          severity: "warning"
          type: "constraint"
          test:
            when: { background_lightness: { max: 0.3 } }
            then: { body_letter_spacing: { min: "0.01em", max: "0.03em" } }
      type_to_spacing:
        - id: "composition.persuade-web-page.coupling.heading-padding"
          description: "Section padding scales with the largest heading in the section. H1 sections need large padding; H3-led sections can use standard. All values are responsive."
          severity: "warning"
          type: "constraint"
          test:
            h1:
              section_padding:
                mobile: { min: "4rem", max: "6rem" }
                tablet: { min: "6rem", max: "10rem" }
                desktop: { min: "8rem", max: "14rem" }
            h2:
              section_padding:
                mobile: { min: "3rem", max: "5rem" }
                tablet: { min: "4rem", max: "7rem" }
                desktop: { min: "5rem", max: "10rem" }
            h3:
              section_padding:
                mobile: { min: "3rem", max: "4rem" }
                desktop: { min: "4rem", max: "6rem" }

    # --- Whitespace principle ---
    whitespace:
      id: "composition.persuade-web-page.whitespace"
      type: "reference"
      description: "Generous whitespace is the primary signal of quality on persuasive pages. Perceived luxury correlates with empty space. When in doubt, add more space, not more content. The default section padding for persuasive pages is the medium spacing (5rem), not the standard (4rem). Standard padding is for inform-purpose pages."

  # ---------------------------------------------------------------------------
  # INFORM x WEB PAGE -- docs, blog, case studies, technical guides
  # ---------------------------------------------------------------------------
  inform_web_page:
    id: "composition.inform-web-page"
    type: "reference"
    description: "Composition for informational web pages. Color becomes wayfinding, not atmosphere. Spacing tightens and steadies. Typography shifts from display to body. No narrative arc."

    register:
      id: "composition.inform-web-page.register"
      type: "reference"
      description: "Clarity earns trust. The reader arrives with a question and expects a precise answer. No narrative arc, no emotional journey. Metronomic rhythm signals reliability. Color marks navigation state, not atmosphere. The page earns trust by being exactly what it claims to be: a reference."
      trust_sequence: "Question (arrival) → answer (scannable, immediate) → depth (available but not forced)"
      dominant_register: "Precise -- tight spacing, uniform rhythm, data-forward, no decoration"

    section_roles:
      title:        { color_intensity: "supporting", type_max: "h1", section_padding: "3rem", note: "Page-level framing. One per page. H1 used only here." }
      explanation:  { color_intensity: "breathing",  type_max: "h2", section_padding: "3rem", note: "Core content. Body text runs the page." }
      example:      { color_intensity: "breathing",  type_max: "h3", section_padding: "3rem", note: "Code blocks, screenshots, demos. Mono font for code." }
      reference:    { color_intensity: "breathing",  type_max: "h3", section_padding: "3rem", note: "API tables, parameter lists, specs." }
      callout:      { color_intensity: "supporting",  type_max: "h3", section_padding: "2rem", note: "Tips, warnings, notes. Teal left border for tips, destructive for warnings." }
      summary:      { color_intensity: "breathing",  type_max: "h2", section_padding: "3rem", note: "Recap or next steps. Optional." }
    rhythm: "Metronomic. Every section has equal visual weight. No hero, no crescendo. Roles are interchangeable and repeatable in any order."
    coupling:
      - id: "composition.inform-web-page.coupling.line-length"
        description: "65ch max line length throughout. Tighter than persuade."
        severity: "warning"
        type: "constraint"
        test: { max_line_length: "65ch" }
      - id: "composition.inform-web-page.coupling.uniform-padding"
        description: "Uniform 3rem section padding regardless of heading level. Steady rhythm, no drama."
        severity: "warning"
        type: "constraint"
        test: { section_padding: { value: "3rem" } }
      - id: "composition.inform-web-page.coupling.color-wayfinding"
        description: "Color marks navigation state (active sidebar, section indicator), not atmosphere. No tinted section backgrounds. Brand accent on interactive elements only."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does this inform page use brand color for atmospheric or decorative purposes (tinted section backgrounds, gradient strips, colored dividers)? Color should only mark navigation state and interactive elements. Answer YES if decorative color is found, NO if color is restricted to wayfinding and interactivity."

  # ---------------------------------------------------------------------------
  # INFORM x SLIDE DECK -- training materials, technical presentations
  # ---------------------------------------------------------------------------
  inform_slide_deck:
    id: "composition.inform-slide-deck"
    type: "reference"
    description: "Technical presentations and training. One idea per slide, H2 max, 60% whitespace minimum. Teal in diagrams only."
    section_roles:
      title:    { color_intensity: "supporting", type_max: "h1", note: "Deck title slide. Brand mark + topic." }
      content:  { color_intensity: "breathing",  type_max: "h2", note: "One point per slide. H2 + body or H2 + diagram." }
      diagram:  { color_intensity: "supporting",  type_max: "h3", note: "Technical diagram. Teal for primary paths, neutral for secondary." }
      summary:  { color_intensity: "breathing",  type_max: "h2", note: "Recap. Key takeaways as a list." }
    coupling:
      - id: "composition.inform-slide-deck.coupling.type-floor"
        description: "24pt body minimum for projection readability."
        severity: "error"
        type: "constraint"
        test: { body_size: { min: "24pt" } }
      - id: "composition.inform-slide-deck.coupling.whitespace"
        description: "60% minimum whitespace per slide. Inform slides are sparse."
        severity: "warning"
        type: "constraint"
        test:
          whitespace_percent: { min: 60 }

  # ---------------------------------------------------------------------------
  # ANALYZE x DASHBOARD -- analytics, monitoring, data viz
  # ---------------------------------------------------------------------------
  analyze_dashboard:
    id: "composition.analyze-dashboard"
    type: "reference"
    description: "Dashboards and data visualization. Full palette allowed (this is what the gradient was designed for). Grid layout, compact spacing, data-dense typography. Fundamentally different from persuade."

    register:
      id: "composition.analyze-dashboard.register"
      type: "reference"
      description: "Competence earns trust. The user is an operator making decisions under time pressure. Every pixel serves the data. The dashboard earns trust by showing exactly what's happening with zero interpretation overhead. Full palette is earned here because color encodes meaning (status, trend, category), not atmosphere."
      trust_sequence: "Status (KPI strip) → detail (drill into panels) → action (alerts, thresholds)"
      dominant_register: "Precise -- tabular-nums, compact density, functional color, zero decoration"

    panel_roles:
      kpi_strip:    { color_intensity: "supporting", type: "Large numbers (24-32px, weight 700) + trend arrows + sparklines. 4-6 metrics.", layout: "horizontal row" }
      chart_panel:  { color_intensity: "full_palette", type: "Chart title H3, axis labels 12px mono, legend 12px.", layout: "grid cell, min 300px wide" }
      table_panel:  { color_intensity: "breathing", type: "13px body, tabular-nums, 1.4 line-height.", layout: "grid cell, scrollable" }
      status_panel: { color_intensity: "functional", type: "Status badges (red/amber/green), 13px mono labels.", layout: "sidebar or grid cell" }
      filter_bar:   { color_intensity: "breathing", type: "14px inputs, neutral background.", layout: "top-fixed or sidebar" }
    layout:
      type: "CSS Grid, 12-column"
      sidebar: "240-280px nav"
      panel_gap: "0.75-1rem"
      card_padding: "1-1.5rem"
      max_section_padding: "3rem"
    color_rules:
      - id: "composition.analyze-dashboard.color.functional"
        description: "Color is functional, not decorative. Three encoding types: status (red/amber/green), categorical (distinct hues per series, max 6), sequential (single-hue lightness ramp)."
        type: "reference"
      - id: "composition.analyze-dashboard.color.teal-default"
        description: "Teal is the default/primary series color. Teal-dominance rule (70%) relaxes for dashboards but teal remains the first color in any categorical set."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does any categorical data visualization on this dashboard use a non-teal color as the first/default/primary series color? Answer YES if another color leads instead of teal, NO if teal is the first color in each categorical set."
    typography:
      body_size: "13-14px"
      kpi_size: "24-32px"
      table_cell: "13px, line-height 1.4"
      font_features: "tabular-nums mandatory for all numeric displays"
      mono_usage: "Raw values, timestamps, IDs, status codes"
    coupling:
      - id: "composition.analyze-dashboard.coupling.density"
        description: "Whitespace is compressed with discipline, not eliminated. Panel gap 0.75-1rem, card padding 1-1.5rem. Tighter than persuade but never cramped."
        severity: "warning"
        type: "constraint"
        test:
          panel_gap: { min: "0.75rem", max: "1rem" }
          card_padding: { min: "1rem", max: "1.5rem" }

  # ---------------------------------------------------------------------------
  # CONVERT x WEB PAGE -- pricing, signup, demo request
  # ---------------------------------------------------------------------------
  convert_web_page:
    id: "composition.convert-web-page"
    type: "reference"
    description: "Convert pages strip away everything that does not serve the action. Funnel, not narrative. Color is functional (CTA only). Spacing creates momentum, not luxury."

    register:
      id: "composition.convert-web-page.register"
      type: "reference"
      description: "Focus earns trust. The visitor has already been persuaded -- they're here to act. Every element that doesn't serve the conversion is friction. Micro-reassurance (no credit card, cancel anytime) does the trust work. Restraint is not luxury here -- it's momentum."
      trust_sequence: "Value (one sentence) → options (max 3 tiers) → reassurance (micro-copy) → action (single CTA)"
      dominant_register: "Precise -- functional color, tight spacing, zero distraction"

    funnel_roles:
      value:   { color_intensity: "breathing", type_max: "h2", section_padding: "4rem", note: "Value proposition. One sentence, clear benefit." }
      trust:   { color_intensity: "breathing", type_max: "h3", section_padding: "3rem", note: "Social proof. Logos, testimonials, deployment count. Compact." }
      options: { color_intensity: "supporting", type_max: "h2", section_padding: "4rem", note: "Pricing tiers or plan comparison. Max 3 tiers. Recommended tier highlighted with accent." }
      action:  { color_intensity: "supporting", type_max: "h2", section_padding: "4rem", note: "Final CTA. One primary button. Micro-reassurance within 1rem below." }
    funnel_rules:
      - id: "composition.convert-web-page.funnel.single-cta"
        description: "One primary filled CTA button per page. Secondary actions use ghost or text-link treatment only."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does this convert page have more than one primary filled CTA button? Count only filled/solid-background buttons, not ghost or text-link treatments. Answer YES if there is more than one primary filled CTA, NO if there is exactly one."
      - id: "composition.convert-web-page.funnel.max-tiers"
        description: "Max 3 pricing tiers. More than 6 options drops conversion from 30% to 3% (Hick's Law)."
        severity: "error"
        type: "constraint"
        test: { max: 3 }
      - id: "composition.convert-web-page.funnel.reassurance"
        description: "Every primary CTA needs micro-reassurance within 1rem below: 'No credit card required,' 'Cancel anytime,' '30-second setup.'"
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Is the primary CTA button missing micro-reassurance text (e.g., 'No credit card required', 'Cancel anytime', '30-second setup') within 1rem below it? Answer YES if reassurance is missing, NO if present."
      - id: "composition.convert-web-page.funnel.no-escape"
        description: "Convert pages should minimize navigation distractions. Reduced header, no sidebar, no competing links in the main content area."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does this convert page have a full navigation header, sidebar, or competing links in the main content area that distract from the primary conversion action? Answer YES if distractions are present, NO if the page is focused."
    coupling:
      - id: "composition.convert-web-page.coupling.tight-spacing"
        description: "Section padding 3rem-4rem. Momentum over luxury. No 8rem hero-scale padding."
        severity: "warning"
        type: "constraint"
        test: { section_padding: { min: "3rem", max: "4rem" } }
      - id: "composition.convert-web-page.coupling.functional-color"
        description: "CTA button and the recommended-tier highlight are the only saturated elements. Everything else neutral. No tinted section backgrounds, no gradient strips. The recommended-tier highlight is functional (guides the decision, users spend 42% more time on highlighted plans), not decorative."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Are there saturated or brand-colored elements on this convert page beyond the primary CTA button and the recommended-tier highlight? Look for tinted section backgrounds, gradient strips, or decorative color. Answer YES if non-functional saturated elements exist, NO if color is restricted to CTA and tier highlight only."

  # ---------------------------------------------------------------------------
  # PERSUADE x AD BANNER -- display ads (Google, LinkedIn, social)
  # ---------------------------------------------------------------------------
  persuade_ad_banner:
    id: "composition.persuade-ad-banner"
    type: "reference"
    description: "Brand impression in under 2 seconds. Treat the banner as recognition, not conversion. Restraint + one bold idea."
    elements: "Max 4 elements: brand mark, headline (3-8 words), CTA or proof image, whitespace."
    layout: "Z-pattern: logo top-left, headline center, CTA bottom-right."
    color: "Teal + neutrals only. Two-color max (verdigris + one supporting neutral)."
    typography: "One typeface (Lato for headline, Inter for body). Headline 5-12 words max."
    whitespace: "30% minimum of ad surface."
    rules:
      - id: "composition.persuade-ad-banner.max-elements"
        description: "Max 4 visual elements. More than 4 creates clutter at glance speed."
        severity: "error"
        type: "constraint"
        test: { max: 4 }
      - id: "composition.persuade-ad-banner.brand-recognition"
        description: "Logo must be visible within 1 second. Place in top-left or top-center."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Is the Verdigris logo missing, hidden, or placed outside top-left/top-center of this ad banner? Answer YES if the logo is absent or misplaced, NO if it is prominent and correctly positioned."

  # ---------------------------------------------------------------------------
  # PERSUADE x EMAIL -- marketing emails
  # ---------------------------------------------------------------------------
  persuade_email:
    id: "composition.persuade-email"
    type: "reference"
    description: "The best B2B emails look like well-formatted text, not marketing collateral. Heavily designed emails underperform because recipients perceive them as ads."
    layout: "Single column, 600px max width."
    color: "Brand teal on CTA button only. Body is black text on white. Header may use a teal accent line."
    typography: "System font stack (14-16px body, 22-28px headings). Match email client defaults for trust."
    sections: "Max 3 content sections before footer. One CTA per section."
    rules:
      - id: "composition.persuade-email.single-column"
        description: "Single column layout, 600px max. Multi-column breaks on mobile email clients."
        severity: "error"
        type: "constraint"
        test:
          max: 600
      - id: "composition.persuade-email.cta-per-section"
        description: "One CTA per content section. Multiple competing CTAs reduce click-through."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does any content section in this email contain more than one CTA button or CTA link? Answer YES if any section has multiple competing CTAs, NO if each section has at most one CTA."

  # ---------------------------------------------------------------------------
  # PERSUADE x SLIDE DECK -- investor pitch, sales deck, conference talk
  # ---------------------------------------------------------------------------
  persuade_slide_deck:
    id: "composition.persuade-slide-deck"
    type: "reference"
    description: "Narrative arc adapted for presenter-paced delivery. Each slide is a section. The presenter replaces scroll-pacing with click-pacing."
    narrative_roles:
      hook:      { color_intensity: "full", type_max: "h1", note: "Title slide. Brand mark + one-sentence value prop. Dark bg. 3-second scan." }
      context:   { color_intensity: "breathing", type_max: "h2", note: "Problem statement. 1-2 slides. One point per slide." }
      evidence:  { color_intensity: "supporting", type_max: "h2", note: "Solution, market, product. 3-5 slides. Cards, diagrams, screenshots." }
      turn:      { color_intensity: "accent", type_max: "h2", note: "Traction inflection. The one accent slide. Key metric that changes the conversation." }
      proof:     { color_intensity: "supporting", type_max: "h2", note: "Logos, financials, team. 2-3 slides." }
      close:     { color_intensity: "full", type_max: "h2", note: "The ask. Dark bg bookends the hook." }
    arc_rules:
      - id: "composition.persuade-slide-deck.arc.count"
        description: "10-15 slides total. Under 10 feels thin; over 15 loses attention (DocSend data: investors spend ~15 seconds per slide)."
        severity: "warning"
        type: "constraint"
        test: { min: 10, max: 15 }
      - id: "composition.persuade-slide-deck.arc.single-turn"
        description: "One turn slide per deck. The accent moment. More than one dilutes the inflection."
        severity: "error"
        type: "constraint"
        test: { max: 1 }
      - id: "composition.persuade-slide-deck.arc.max-low-energy"
        description: "Max 4 consecutive low-energy slides (context, evidence, proof) before a turn or visual break."
        severity: "warning"
        type: "constraint"
        test: { max_consecutive: 4 }
    coupling:
      - id: "composition.persuade-slide-deck.coupling.type-floor"
        description: "24pt body minimum for projection. 40-72pt headline range. Max 6 lines of body text per slide. Max 2 type sizes per slide."
        severity: "error"
        type: "constraint"
        test: { body_size: { min: "24pt" }, headline_size: { min: "40pt", max: "72pt" } }
      - id: "composition.persuade-slide-deck.coupling.dark-bookends"
        description: "Dark slides restricted to hook and close (bookends). Mid-deck dark slides break the light flow."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Are there any dark-background slides in the middle of this deck (not the first or last slide)? Answer YES if dark slides appear mid-deck, NO if dark backgrounds are restricted to the opening and closing slides only."
      - id: "composition.persuade-slide-deck.coupling.chart-colors"
        description: "Max 3 colors per chart. Data viz limited to 60% of slide content zone."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval: "Does any chart on this slide use more than 3 distinct colors, or does any data visualization occupy more than 60% of the slide content zone? Answer YES if either limit is exceeded, NO if charts use 3 or fewer colors and fit within 60%."
    spacing: "8% safe margin inset from slide edges for 16:9. Content zone centered. Vertical centering default."

  # ---------------------------------------------------------------------------
  # IDENTIFY x AD BANNER -- brand recognition ads
  # ---------------------------------------------------------------------------
  identify_ad_banner:
    id: "composition.identify-ad-banner"
    type: "reference"
    description: "Pure brand recognition in under 2 seconds. Not trying to persuade or convert, just to be remembered as Verdigris."
    color: "Teal on dark or teal accent on white. No secondary palette regions."
    typography: "Brand mark + 3-8 word tagline. One typeface."
    layout: "Z-pattern. Logo top-left, tagline center."
    whitespace: "30% minimum."
    rules:
      - id: "composition.identify-ad-banner.teal-only"
        description: "Verdigris teal + neutrals only. No other palette regions. Instant recognition requires consistency."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does this identify ad banner use any colors beyond Verdigris teal and neutrals (white, gray, black)? Look for secondary palette regions like purple, yellow, or blue. Answer YES if non-teal/non-neutral colors are present, NO if only teal and neutrals are used."

  # ---------------------------------------------------------------------------
  # IDENTIFY x HARDWARE -- physical products, labels, trade show
  # ---------------------------------------------------------------------------
  identify_hardware:
    id: "composition.identify-hardware"
    type: "reference"
    description: "Physical products and materials. The device should look like architecture, not electronics."
    color: "One teal accent element (logo, LED indicator, accent line). Neutral housing."
    brand_mark: "Single wordmark placement. Centrally placed or top-center."
    materials: "Matte finish preferred. Regulatory text on underside or recessed label."
    rules:
      - id: "composition.identify-hardware.single-accent"
        description: "One brand teal accent on the physical surface. The logo is the only decorative element."
        type: "reference"

  # ---------------------------------------------------------------------------
  # ASSIST x CHAT -- human-to-AI conversational interface
  # ---------------------------------------------------------------------------
  assist_chat:
    id: "composition.assist-chat"
    type: "reference"
    description: "Conversational AI interface. Competence-driven, not character-driven. The interface disappears so content dominates. AI as expert tool, not chatbot."
    layout:
      type: "Flat document-style for AI responses (no chat bubbles). User messages may use subtle background."
      reading_width: "680-720px for prose. Code and tables break wider."
      vertical_spacing: "20px top, 10px sides, 15px bottom between messages."
    color:
      ai_response: "Monochrome text. Color reserved for links, syntax highlighting, data viz, interactive elements."
      user_message: "May use subtle brand tint (teal at 3-5%) for background distinction."
      system_message: "Neutral gray."
    typography:
      prose: "Proportional sans-serif (Inter). Standard body size (1rem)."
      code: "Monospace (JetBrains Mono) at 14px. Background tinting for inline code."
      data: "Tabular-nums for metrics. Exact values, not ranges (Precise pillar)."
    brand_mapping:
      precise: "No hedging. Exact kWh, timestamps, confidence intervals. Citation-forward like Perplexity."
      masterful: "AI as infrastructure, not a character. Linear's approach. No animated avatars, no personality theater."
      refined: "Interface disappears so content dominates. Claude's vanishing-chrome philosophy. Minimal decorative motion."
      pioneering: "Active artifacts: live charts, drillable metrics, interactive tables within responses. The response IS the analysis tool."
    rules:
      - id: "composition.assist-chat.no-personality"
        description: "B2B AI interactions favor competence over personality. No emoji in AI responses, no casual tone, no character-driven interactions."
        severity: "warning"
        type: "constraint"
        test:
          llm_eval:
            prompt: "Evaluate this AI chat response for personality signals that conflict with B2B infrastructure professionalism."
            rubric:
              - criterion: "Emoji usage"
                score: "0 = none, 5 = occasional, 10 = frequent"
                fail_threshold: 1
              - criterion: "Casual or informal tone"
                score: "0 = professional, 5 = mixed, 10 = chatbot personality"
                fail_threshold: 3
              - criterion: "Character-driven language"
                score: "0 = infrastructure voice, 5 = some personality, 10 = animated avatar energy"
                fail_threshold: 2
            aggregation: "fail if ANY single criterion exceeds its fail_threshold"
      - id: "composition.assist-chat.flat-layout"
        description: "AI responses use flat document layout, not chat bubbles. Bubbles are for consumer messaging, not expert tools."
        severity: "warning"
        type: "constraint"
        test:
          regex: "chat-bubble|message-bubble|bubble-|rounded-full.*message"

  # ---------------------------------------------------------------------------
  # ASSIST x EMBEDDED -- AI-generated content within other surfaces
  # ---------------------------------------------------------------------------
  assist_embedded:
    id: "composition.assist-embedded"
    type: "reference"
    description: "AI-generated content appearing within dashboards, reports, or web pages. Must be visually distinguished from human-authored content. EU AI Act Article 50 requires AI content labeling by August 2026."
    visual_distinction:
      marker: "Subtle consistent visual marker: thin left-border accent (2px, neutral.400) or provenance icon."
      tint: "Optional light background tint (neutral.100) to distinguish from surrounding content."
      label: "Machine-readable metadata for AI provenance. Human-readable indicator for regulatory compliance."
    trust_signals:
      citations: "AI claims backed by data should include source reference (sensor ID, timestamp, confidence)."
      disclaimer: "Brief capability disclaimer accessible but not prominent."
      human_review: "AI drafts, human reviews, explicit acceptance. Show review state."
    rules:
      - id: "composition.assist-embedded.visual-marker"
        description: "AI-generated content on non-chat surfaces must have a consistent visual marker distinguishing it from human-authored content."
        severity: "error"
        type: "constraint"
        test:
          regex: "border-l-2|border-left.*2px|ai-marker|provenance|data-ai-generated"
      - id: "composition.assist-embedded.provenance"
        description: "AI-generated content must include machine-readable provenance metadata. EU AI Act Article 50 compliance required by August 2026."
        severity: "error"
        type: "constraint"
        test:
          regex: "data-ai-provenance|data-ai-source|ai-provenance|content-credentials|c2pa|data-generated-by"

  # ---------------------------------------------------------------------------
  # NARRATE x WEB PAGE -- long-form editorial, design essays, retrospectives
  # ---------------------------------------------------------------------------
  # Not persuade (no funnel, no conversion). Not inform (not flat, not reference).
  # The reader follows a journey. Specimens and visuals are figures within prose.
  # Think magazine feature: Craig Mod, Frank Chimero, Stripe's Annual Letter.
  # ---------------------------------------------------------------------------
  narrate_web_page:
    id: "composition.narrate-web-page"
    type: "reference"
    description: "Long-form editorial for design essays, retrospectives, case narratives. The reader follows a journey with depth. Visuals are figures within prose, not marketing sections. Generous whitespace, steady reading rhythm, honesty about process."

    register:
      id: "composition.narrate-web-page.register"
      type: "reference"
      description: "Honesty earns trust. The reader follows a journey that shows process, including failures. No marketing patterns in prose -- the essay earns trust by being transparent about what worked and what didn't. Mastery is demonstrated through the depth of thinking, not through visual spectacle."
      trust_sequence: "Curiosity (opening) → understanding (episodes) → respect (reflection) → thinking (closing)"
      dominant_register: "Masterful -- depth through honesty, craft visible in the thinking not the polish"

    # --- Narrative structure ---
    # Not roles like persuade (hook/turn/close). Narrate uses a looser structure:
    # the piece flows through episodes, each with prose + a figure (specimen, before/after, code).
    structure:
      opening:
        description: "Set the scene. A specific moment, question, or observation that draws the reader in. Not a hero with a CTA. A quiet start."
        color_intensity: "full or supporting"
        type_max: "h1"
        section_padding: "8rem"
        note: "Can be dark (atmospheric) or light (editorial). The opening sets the tone for the piece."
      episode:
        description: "A chapter in the story. Prose followed by a figure (specimen, before/after, code block, visual comparison). Repeatable, any number."
        color_intensity: "breathing or supporting"
        type_max: "h2"
        section_padding: "5rem"
        note: "Episodes alternate between prose sections and figure sections. Prose is body-first. Figures get their own visual space."
      figure:
        description: "A visual embedded in the narrative. Rendered specimen, before/after comparison, code example, color swatch. Figures are the evidence within episodes."
        color_intensity: "varies (the figure itself may use any intensity)"
        type_max: "caption"
        section_padding: "3rem"
        note: "Figures sit within episodes, not as standalone sections. They have a caption (mono, small) and generous margin above and below."
      reflection:
        description: "Honest assessment of what worked, what didn't, what the process can't do. The narrate purpose demands self-awareness."
        color_intensity: "breathing"
        type_max: "h2"
        section_padding: "5rem"
        note: "This is what distinguishes narrate from persuade. Persuade hides failures. Narrate shows them."
      closing:
        description: "Not a CTA. A question, invitation, or forward look. The reader leaves thinking, not clicking."
        color_intensity: "full or supporting"
        section_padding: "8rem"

    # --- Reading rhythm ---
    rhythm:
      description: "Steady, magazine-like pacing. No dramatic arc (persuade) or metronomic flatness (inform). Episodes create natural chapter breaks. Figures provide visual rest between prose. The reader sets their own pace."
      line_length: "65ch max for prose. Figures may break wider."
      body_size: "1rem minimum, 1.125rem preferred for long-form readability."
      body_line_height: "1.7 for long-form prose (looser than persuade's 1.6)."

    # --- Color usage ---
    color:
      description: "Color is illustrative, not atmospheric. The palette appears IN the figures (specimens, before/after comparisons) not as section background tints. Between figures, the page is neutral. This lets the illustrated colors speak without competing with ambient color."
      page_background: "White and neutral.100 for prose sections. Dark only for opening and closing."
      figure_background: "Figures may use any palette region as needed for illustration."
      accent_budget: "No earned accent in the persuade sense. Color appears as part of the content (the things being shown), not as a compositional device on the page itself."

    # --- Coupling rules ---
    coupling:
      - id: "composition.narrate-web-page.coupling.prose-spacing"
        description: "Prose sections use 5rem padding. Figures within episodes use 3rem margin. Opening and closing use 8rem."
        severity: "warning"
        type: "constraint"
        test:
          opening: { section_padding: { min: "8rem", max: "14rem" } }
          episode: { section_padding: { min: "5rem", max: "8rem" } }
          figure:  { margin: { min: "3rem", max: "5rem" } }
          closing: { section_padding: { min: "8rem", max: "14rem" } }
      - id: "composition.narrate-web-page.coupling.long-form-line-height"
        description: "Body line-height 1.7 for sustained reading. Looser than persuade (1.6). Magazine-grade readability."
        severity: "warning"
        type: "constraint"
        test: { body_line_height: { min: 1.7, max: 1.85 } }
      - id: "composition.narrate-web-page.coupling.figure-margin"
        description: "Figures have 3rem margin above and below within their episode. They breathe separately from prose."
        severity: "warning"
        type: "constraint"
        test:
          figure_margin: { min: "3rem", max: "5rem" }
      - id: "composition.narrate-web-page.coupling.no-marketing-patterns"
        description: "No CTA buttons in prose sections. No gradient strips. No card grids as content (cards may appear inside figures). The page is an essay, not a landing page."
        severity: "error"
        type: "constraint"
        test:
          llm_eval: "Does this editorial/narrate page section contain CTA buttons in prose, gradient strips, card grids used as content, or other marketing landing page patterns? Answer YES if marketing patterns are found, NO if the section is pure editorial."

  # ---------------------------------------------------------------------------
  # INSTRUCT x MACHINE -- AI agents consuming the design system
  # ---------------------------------------------------------------------------
  instruct_machine:
    id: "composition.instruct-machine"
    type: "reference"
    description: "Machine-to-machine surface. The consumer is an AI agent reading YAML, JSON, and markdown to build visual outputs. No visual design -- the design is the structure and clarity of the rules themselves."
    principles:
      - "Every rule has id, severity, type, description. Machines parse structure, not prose."
      - "Numeric values have explicit units and bounds (floor AND ceiling)."
      - "Cross-references use id paths, not prose descriptions."
      - "Token values are canonical -- never fabricate oklch values outside the token set."
      - "Guidance rules include both what TO do and what NOT to do. Machines optimize toward maximums without upper bounds."
    rules:
      - id: "composition.instruct-machine.floors-and-ceilings"
        description: "Every guidance rule that sets a minimum must also set a maximum. AI agents interpret 'at least 2' as 'use as many as possible.'"
        type: "reference"
