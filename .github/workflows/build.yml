name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Validate tokens
        run: npm run validate

      - name: Validate visual rules
        run: npm run validate:rules

      - name: Build outputs
        run: npm run build

      - name: Verify dist files exist
        run: |
          test -f build/dist/css/oklch.css
          test -f build/dist/css/hsl.css
          test -f build/dist/hex/colors.json
          test -f build/dist/tailwind/preset.js

      - name: Lint external-facing content
        run: npm run lint:external

  cross-browser-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Install Playwright browsers
        run: npm run test:browser:install

      - name: Run cross-browser smoke tests
        run: npm run test:browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the Jekyll site so lychee can check resolved URLs rather than raw
      # source files that contain {{ '/...' | relative_url }} liquid templates.
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Check links in built site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept '200,203,204,206,301,302,308,429'
            --exclude-loopback
            --root-dir ${{ github.workspace }}/_site
            --fallback-extensions html
            './_site/**/*.html'
          fail: true
