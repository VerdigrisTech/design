voice_sample_field_report: |
  Project: [partner site]
  EDG: [redacted]

  Installation Status Update
  :white_check_mark: What went well:
  - Electrician completed physical installation of CTs and wiring.
  - CT chain verified on-site:
    - Chain 1: 16 CTs (confirmed via install + EDG detection)
    - Chain 2: 6 CTs
  - Sensor detection at EDG level is correct.
  - EDG successfully came online (red → orange → green progression).
  - LTE modem detected and registered on network.

  :warning: What did not go well:
  - Mobile app was not usable: LTE option did not appear, configuration
    screen kept spinning. Installer abandoned app flow.
  - Had to switch to browser-based setup.
  - LTE signal quality is poor (fluctuating ~5–30%).

  :construction: Issues / Blockers:
  1. Connectivity instability — weak LTE signal, no Ethernet on-site.
     Likely root cause of delayed/partial system sync.
  2. Admin console CT mismatch — console shows incorrect count, EDG
     internally detects correct count. Likely due to incomplete data
     ingestion or delayed sync.
  3. No data transmission yet — potentially due to incorrect admin
     console configuration.

  cc <@josh> <@hong-bin> <@jon>
  Any idea on how to fix Admin Console CT mismatch?

voice_sample_engineering_escalation: |
  Follow-up to this thread. While building out the dashboard's
  per-event waveform inspection, I hit an edge case caused by the same
  bursty-trigger behavior we already discussed.

  What's happening:
  - The dashboard's waveform analysis view fetches one event at a time
    via the per-panel waveforms endpoint with a ±1s window around the
    event timestamp.
  - On normal panels this returns 1 event (~50 KB). On a panel in a
    fault burst, the same 2-second window can contain dozens of events.

  Concrete numbers from a HAR I captured today: ~2.88 MB, 100 seconds
  for a single 2-second window. ~57 events × ~50 KB each. The browser
  downloads + parses the multi-MB response before the dashboard's
  client-side filter runs, freezing the page for minutes; on
  customer-facing builds it never visibly recovers.

  Asks (priority order):
  1. An ?event_id= or ?limit=1 query parameter on /waveforms. This
     lets the client request exactly one event regardless of burst
     density.
  2. (Out of band) once the firmware fix lands — the trigger-suppression
     proposal in this thread — the burst case largely disappears at
     the source, and the API change above stops being load-bearing.
  3. Documentation note on /waveforms's worst-case behavior so future
     integrations don't trip on this.

  No client fix is planned right now (it'd be a workaround that hides
  the problem).

