  - '"G/NG to..." with checkbox lists'
  - '"I''m willing to..." / "Honest assessment up-front:"'
  - '"eyes-open" / "we''ll likely miss it"'
  - "I read your reply, and I want to push back, because..."
  - "That defers the diagnosis, it doesn't engage with it."
  - '"Please lmk" / "lmk"'
  - "I see it differently."
  - "thank you 3000~"
  - "I could be wrong here; this is based on..."
  - "AFAIK"
  - '":thinking_face:" / "cool"'
  - "Sorry we haven't had a [system] that is based on... yet."
  - "Please try structure this document in a way where you can be accountable of..."

voice_sample_policy: |
  <@Mark> <@jon> — following up on yesterday's session. We didn't get
  through everything, and on reflection I want to revise my answers
  on the open topics.

  1. Fleet management as an Edge OKR — yes, with a caveat.

  I'm willing to put it in as an aspirational target. Honest assessment
  up-front: based on current bandwidth, we'll likely miss it — same
  pattern as the EVT OKRs in previous quarters, where the constraint
  was capacity, not skill. The value of the OKR is the gap as a
  forcing function for the resourcing conversation; I want us to go in
  eyes-open about the likely score so we don't end up relitigating it
  when it lands low.

  2. On hiring and staffing — let's reopen the conversation properly.

  We are hiring right now. A more aggressive hiring plan has been
  drafted since 2022. I'd welcome a fresh discussion on how to staff
  Edge so the team can be accountable to the OKRs we set.

  Things are moving. They're moving slower than any of us would like,
  because the resources to accelerate them haven't been there. That's
  not the same as not moving.

  Please respond with G/NG explicit clarity.

  [ ] G/NG to revise OKR to include everything named above
  [ ] G/NG to deliberately drop firmware fixes/releases to network for
      senior embedded system engineer hire
  [ ] G/NG to review edge team staffing plan

voice_sample_pushback: |
  <@Mark> — I read your reply, and I want to push back, because
  tossing the question back doesn't move us forward.

  You responded to a concrete capacity question with three open-ended
  re-questions. That defers the diagnosis, it doesn't engage with it.
  Seven years into this, I'd expect the CEO's job in this exchange to
  be locating the real bottleneck and committing to address it — not
  redirecting the burden of proof back to the people surfacing it.

  1. "[Team A] spans many disciplines; [Team B] is more focused."

  That's a description of current state, not an argument. [Team A]
  covers firmware, mechanical, hardware, manufacturing, fleet ops,
  support — that's the scope the company chose. Which of those
  disciplines do you think [Team A] should stop contributing to? If
  the answer is "none," the discipline count isn't the lever — capacity
  within them is. If the answer is "some," name them. Without one, the
  observation doesn't lead anywhere.

