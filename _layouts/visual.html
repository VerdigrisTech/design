---
layout: default
---

<style>
  /* Visual-first page styles — extends default.html */

  /* Section label (mono, uppercase, teal) */
  .v-label {
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--brand-teal);
    margin-bottom: 0.5rem;
  }

  /* Visual demo container */
  .v-demo {
    padding: 2rem 0 1.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  /* Swatch grid */
  .v-swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 0.625rem;
  }
  .v-swatch {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .v-swatch-color {
    width: 4.5rem;
    height: 3rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  html.dark .v-swatch-color {
    border-color: oklch(1 0 0 / 20%);
  }
  .v-swatch-name {
    font-family: var(--font-mono);
    font-size: 0.5625rem;
    color: var(--muted-fg);
    line-height: 1.3;
    max-width: 4.5rem;
  }

  /* Type specimen rows */
  .v-type-row {
    display: grid;
    grid-template-columns: 7rem 1fr;
    gap: 1rem;
    align-items: baseline;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
  }
  .v-type-row:last-child { border-bottom: none; }
  .v-type-meta {
    font-family: var(--font-mono);
    font-size: 0.625rem;
    color: var(--muted-fg);
    line-height: 1.4;
  }
  @media (max-width: 768px) {
    .v-type-row { grid-template-columns: 1fr; gap: 0.25rem; }
  }

  /* Spacing scale */
  .v-spacing-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: flex-end;
  }
  .v-spacing-item { text-align: center; }
  .v-spacing-block {
    background: var(--brand-teal);
    border-radius: 2px;
    opacity: 0.6;
    width: 1rem;
  }
  .v-spacing-label {
    font-family: var(--font-mono);
    font-size: 0.5625rem;
    color: var(--muted-fg);
    margin-top: 0.25rem;
  }

  /* Component demo box */
  .v-comp-demo {
    padding: 1.5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    margin-bottom: 1rem;
  }
  .v-comp-label {
    font-family: var(--font-mono);
    font-size: 0.625rem;
    color: var(--muted-fg);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .v-comp-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  /* Button demos (HTML rendered) */
  .v-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    border: none;
    cursor: pointer;
    text-decoration: none;
    line-height: 1;
    transition: opacity 150ms ease;
  }
  .v-btn:hover { opacity: 0.9; }
  .v-btn-default { background: var(--neutral-900); color: var(--neutral-50); }
  html.dark .v-btn-default { background: var(--neutral-200); color: var(--neutral-900); }
  .v-btn-destructive { background: oklch(0.577 0.245 27.325); color: white; }
  html.dark .v-btn-destructive { background: oklch(0.704 0.191 22.216); }
  .v-btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  .v-btn-secondary { background: var(--muted); color: var(--fg); }
  .v-btn-ghost { background: transparent; color: var(--fg); }
  .v-btn-ghost:hover { background: var(--muted); }
  .v-btn-link { background: transparent; color: var(--fg); text-decoration: underline; padding: 0; }
  .v-btn-sm { height: 2rem; padding: 0.25rem 0.75rem; font-size: 0.8125rem; }
  .v-btn-lg { height: 2.75rem; padding: 0.5rem 1.5rem; }

  /* Card demo */
  .v-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 1.5rem;
    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  }
  .v-card-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.125rem;
    margin-bottom: 0.25rem;
  }
  .v-card-desc {
    font-size: 0.875rem;
    color: var(--muted-fg);
  }

  /* Badge */
  .v-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
  }
  .v-badge-pass { background: oklch(0.45 0.15 145); color: white; }
  .v-badge-fail { background: oklch(0.577 0.245 27.325); color: white; }

  /* Shadow demo */
  .v-shadow-card {
    width: 5rem;
    height: 3.5rem;
    border-radius: var(--radius);
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.625rem;
    color: var(--muted-fg);
  }
  html.dark .v-shadow-card {
    background: var(--neutral-800);
    border-color: oklch(1 0 0 / 15%);
  }

  /* Gradient strip (reuse from specimen) */
  .v-gradient {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, #0fc8c3, #3b5ea0, #1a0a4a, #c44e7a, #e85d3a, #d4c520, #0fc8c3);
    background: linear-gradient(90deg in oklch,
      oklch(0.75 0.1286 191.57), oklch(0.405 0.1451 264.89),
      oklch(0.29 0.1506 289.33), oklch(0.5975 0.1808 0.42),
      oklch(0.7 0.1909 24.11), oklch(0.87 0.1786 92.23),
      oklch(0.75 0.1286 191.57));
    margin: 1.5rem 0;
  }

  /* Details fold for documentation */
  .v-details {
    margin-top: 2rem;
  }
  .v-details summary {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted-fg);
    cursor: pointer;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
    list-style: none;
  }
  .v-details summary::before {
    content: '+ ';
  }
  .v-details[open] summary::before {
    content: '- ';
  }
  .v-details summary:hover {
    color: var(--fg);
  }

  /* Grid layouts for demos */
  .v-grid-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
    gap: 1rem;
  }
  .v-grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
    gap: 1rem;
  }

  /* Form elements */
  .v-input {
    font-family: var(--font-body);
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--neutral-200);
    border-radius: calc(var(--radius) - 2px);
    background: oklch(0.985 0 0);  /* neutral.50 — slightly off-white to distinguish from white container */
    color: var(--fg);
    width: 100%;
    max-width: 20rem;
    height: 2.25rem;
    box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  }
  html.dark .v-input {
    background: oklch(0.274 0.006 286.033);  /* neutral.800 — distinct from neutral.950 container */
    border-color: oklch(1 0 0 / 0.15);  /* semi-transparent white — matches semantic input token */
    box-shadow: none;
  }
  .v-input:focus {
    outline: 2px solid var(--brand-teal);
    outline-offset: 2px;
    border-color: var(--brand-teal);
  }
  .v-input::placeholder { color: var(--muted-fg); }

  /* Toast demos */
  .v-toast {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 0.875rem;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    max-width: 24rem;
  }
  .v-toast-icon { font-size: 1rem; }

  /* Tab demo */
  .v-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    gap: 0;
  }
  .v-tab {
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--muted-fg);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--font-body);
  }
  .v-tab-active {
    color: var(--fg);
    border-bottom-color: var(--fg);
  }
</style>

{{ content }}
